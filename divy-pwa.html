<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#0a0a0f"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Divy"/>
<title>Divy's Journey</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
input,textarea{-webkit-user-select:text;user-select:text}
:root{
  --bg:#f5f0e8;--p1:#ffffff;--p2:#faf6f0;--p3:#f0ebe0;
  --b1:#e0d8c8;--b2:#ccc0aa;--b3:#b8a890;
  --gold:#d4a843;--gold2:#b8891e;--gold3:#f0c060;
  --green:#5aac7a;--green2:#3a8c5a;
  --red:#e06060;--blue:#60a0e0;--orange:#e08840;--teal:#50b0a0;
  --text:#2a1f0a;--sub:#6a5a3a;--muted:#9a8a6a;--dim:#c0b090;
  --ff:'DM Sans',sans-serif;--fs:'Cormorant Garamond',serif;
  --r:12px;--r2:8px;--r3:20px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--ff)}
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;position:relative}

/* HEADER */
#hdr{background:linear-gradient(160deg,#3a2a0a 0%,#2a1a04 100%);border-bottom:1px solid var(--b2);padding:12px 16px 10px;flex-shrink:0;z-index:20}
.hdr-row{display:flex;justify-content:space-between;align-items:center}
.hdr-title{font-family:var(--fs);font-size:22px;font-weight:700;color:var(--gold);letter-spacing:.3px}
.hdr-family{font-size:10px;color:var(--sub);margin-top:1px;letter-spacing:1px}
.hdr-wt{font-size:24px;font-weight:700;color:var(--gold);text-align:right;line-height:1}
.hdr-goal{font-size:10px;color:var(--muted);text-align:right;margin-top:2px}
.mode-row{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.mode-tog{display:flex;background:#150f05;border-radius:8px;padding:3px;gap:3px}
.mode-tog button{padding:5px 13px;font-size:11px;font-weight:600;border:none;border-radius:5px;font-family:var(--ff);transition:all .2s;cursor:pointer;color:var(--muted);background:transparent}
.mode-tog .mhome{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0a0a0f}
.mode-tog .mintl{background:linear-gradient(135deg,#1a2a4a,#0a1a2a);color:var(--blue)}
.hdr-date{font-size:11px;color:var(--sub);font-weight:600}
.prog-wrap{margin-top:8px}
.prog-row{display:flex;justify-content:space-between;margin-bottom:3px;font-size:10px;color:var(--muted)}
.prog-pct{color:var(--green);font-weight:700;font-size:11px}
.prog-bar{height:5px;background:var(--b1);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--green));border-radius:3px;transition:width .8s cubic-bezier(.4,0,.2,1)}

/* TABS */
#tabs{display:flex;background:var(--p2);border-bottom:1px solid var(--b1);overflow-x:auto;flex-shrink:0;scrollbar-width:none}
#tabs::-webkit-scrollbar{display:none}
.tb{padding:10px 12px;font-size:11px;font-weight:600;color:var(--muted);border:none;background:none;border-bottom:2px solid transparent;white-space:nowrap;cursor:pointer;font-family:var(--ff);transition:all .2s;flex-shrink:0}
.tb.on{color:var(--gold);border-bottom-color:var(--gold)}

/* BODY */
#body{flex:1;overflow-y:auto;padding:14px;padding-bottom:30px;scrollbar-width:none}
#body::-webkit-scrollbar{display:none}

/* CARDS */
.c{background:var(--p1);border:1px solid var(--b1);border-radius:var(--r);padding:14px;margin-bottom:10px}
.c-gold{border-color:var(--gold);background:var(--p2)}
.c-green{border-color:var(--green2);background:#0a140e}
.c-blue{border-color:#2a4a6a;background:#e8f0fa}
.ctitle{font-size:11px;font-weight:700;color:var(--gold);margin-bottom:10px;text-transform:uppercase;letter-spacing:1.5px}

/* STAT GRID */
.sg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.sb{background:var(--p1);border:1px solid var(--b1);border-radius:10px;padding:11px 8px;text-align:center}
.sv{font-size:20px;font-weight:700}
.sl{font-size:10px;color:var(--muted);margin-top:2px}

/* BUTTONS */
.btn{border:none;border-radius:var(--r2);padding:11px 16px;font-size:13px;font-weight:600;cursor:pointer;width:100%;margin-top:8px;font-family:var(--ff);transition:all .2s}
.btn:active{transform:scale(.97)}
.btn-g{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0a0a0f}
.btn-pk{background:linear-gradient(135deg,#8b3a52,#6b2a3a);color:#fff}
.btn-dim{background:var(--b1);color:var(--text)}
.btn-sm{width:auto;padding:7px 13px;font-size:12px;margin-top:0}
.btn-teal{background:linear-gradient(135deg,#2a6a60,#1a4a42);color:#a0e0d8}

/* INPUTS */
.inp{background:var(--p2);border:1px solid var(--b2);border-radius:var(--r2);padding:10px 12px;color:var(--text);font-size:13px;width:100%;outline:none;font-family:var(--ff);transition:border-color .2s}
.inp:focus{border-color:var(--gold)}
.inp-sm{padding:8px 10px;font-size:12px}

/* CYCLE DOTS */
.cd-row{display:flex;gap:5px;margin-bottom:10px}
.cd{flex:1;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:1px solid var(--b1);transition:all .3s}
.cd-d{background:#1a4a2a;border-color:var(--green2);color:var(--green)}
.cd-n{background:var(--gold);border-color:var(--gold);color:#0a0a0f}
.cd-f{background:var(--p2);color:var(--dim)}

/* SCHED */
.si{display:flex;align-items:flex-start;gap:11px;padding:11px 12px;border-radius:10px;margin-bottom:7px;cursor:pointer;border:1px solid var(--b1);background:var(--p1);transition:all .2s}
.si.dn{background:#09160d;border-color:var(--green2)}
.si-ic{font-size:20px;margin-top:1px;flex-shrink:0}
.si-inf{flex:1}
.si-t{font-size:10px;margin-bottom:1px;font-weight:600}
.si-a{font-size:13px;color:var(--text)}
.si.dn .si-a{color:#7ac49a}
.chk{width:26px;height:26px;border-radius:50%;border:2px solid var(--b2);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--green);flex-shrink:0;margin-top:2px;transition:all .2s}
.si.dn .chk{background:#1a4a2a;border-color:var(--green)}

/* EXERCISE */
.ei{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:10px;margin-bottom:7px;cursor:pointer;border:1px solid var(--b1);background:var(--p1);transition:all .2s}
.ei.dn{background:#09160d;border-color:var(--green2)}
.ei.lk{opacity:.4;cursor:default}
.ei-ic{font-size:22px;flex-shrink:0}
.ei-inf{flex:1}
.ei-n{font-size:13px;font-weight:600}
.ei.dn .ei-n{color:var(--green)}
.ei-d{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.4}
.ei-dur{font-size:10px;color:var(--sub);margin-top:3px}
.ei-pts{font-size:12px;font-weight:700;color:var(--gold);flex-shrink:0;margin-right:4px}

/* BAND GUIDE */
.bg-ex{background:var(--p2);border-radius:8px;padding:10px 12px;margin-bottom:7px;border-left:3px solid var(--teal)}
.bg-name{font-size:12px;font-weight:700;color:var(--teal);margin-bottom:3px}
.bg-step{font-size:11px;color:var(--sub);line-height:1.6}

/* FOOD */
.food-search{position:relative;margin-bottom:10px}
.food-results{position:absolute;top:100%;left:0;right:0;background:var(--p2);border:1px solid var(--b2);border-radius:var(--r2);z-index:50;max-height:200px;overflow-y:auto;display:none}
.food-results.show{display:block}
.fr-item{padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--b1);transition:background .15s}
.fr-item:hover{background:var(--b1)}
.fr-name{font-size:13px}
.fr-cal{font-size:11px;color:var(--gold)}
.food-logged{background:var(--p2);border-radius:var(--r2);padding:10px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.fl-name{font-size:13px}
.fl-meta{font-size:11px;color:var(--muted);margin-top:2px}
.fl-kcal{font-size:14px;font-weight:700;color:var(--gold)}
.fl-del{font-size:16px;cursor:pointer;color:var(--muted);padding:4px}

/* WATER */
.water-wrap{display:flex;flex-direction:column;align-items:center;padding:10px 0}
.water-bottle{position:relative;width:100px;height:180px;margin:0 auto 16px}
.wb-outer{width:100%;height:100%;border:2.5px solid var(--teal);border-radius:20px 20px 14px 14px;overflow:hidden;position:relative;background:rgba(10,20,20,.8)}
.wb-fill{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(0deg,rgba(30,160,140,.9),rgba(80,200,180,.6));transition:height .5s cubic-bezier(.4,0,.2,1);border-radius:0 0 11px 11px}
.wb-lines{position:absolute;inset:0;display:flex;flex-direction:column-reverse;justify-content:space-around;padding:8px 0;pointer-events:none}
.wb-line{height:1px;background:rgba(80,200,180,.15);margin:0 8px}
.wb-label{position:absolute;right:-44px;font-size:10px;color:var(--teal);font-weight:600;font-family:var(--ff)}
.water-info{text-align:center;margin-bottom:12px}
.water-ml{font-size:28px;font-weight:700;color:var(--teal)}
.water-target{font-size:12px;color:var(--sub);margin-top:2px}
.water-btns{display:flex;gap:10px;width:100%;justify-content:center}
.water-add{background:linear-gradient(135deg,#1a5a50,#0a3a32);border:1px solid var(--teal);color:var(--teal);border-radius:10px;padding:12px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--ff);transition:all .2s}
.water-add:active{transform:scale(.95)}
.water-reset{background:var(--b1);border:none;color:var(--muted);border-radius:10px;padding:12px 16px;font-size:12px;cursor:pointer;font-family:var(--ff)}
.water-drops{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:12px}
.wd{width:24px;height:24px;border-radius:50% 50% 40% 60%/50% 50% 60% 40%;border:1.5px solid var(--teal);transition:all .3s}
.wd.full{background:var(--teal)}

/* CALENDAR */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:10px}
.cal-day-hdr{font-size:10px;color:var(--muted);text-align:center;padding:4px 0;font-weight:700}
.cal-day{height:36px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;cursor:pointer;position:relative;transition:all .2s;border:1px solid transparent}
.cal-day.empty{background:transparent;cursor:default}
.cal-day.future{background:var(--p2);color:var(--dim)}
.cal-day.today{background:var(--gold);color:#0a0a0f;font-weight:700}
.cal-day.done{background:#d0f0d8;border-color:var(--green2);color:#2a6a3a;font-weight:700}
.cal-day.skipped{background:#fde8e8;border-color:#e06060;color:var(--red);font-weight:700}
.cal-day.start{background:var(--p3);border-color:var(--gold);color:var(--gold)}
.cal-day.prep{background:#dceeff;border-color:#4a90d0;color:#60b0e0}
.cal-day.prep-done{background:#c8ecd8;border-color:#3a8a5a;color:#2a6a3a;font-weight:700}
.cal-dot{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--gold)}

/* MILESTONES */
.ms{background:var(--p1);border:1px solid var(--b1);border-radius:var(--r);padding:14px;margin-bottom:9px;transition:all .3s}
.ms.ms-d{background:#09160d;border-color:var(--green2)}
.ms.ms-c{background:#120e04;border-color:var(--gold)}
.ms-row{display:flex;justify-content:space-between;align-items:flex-start}
.ms-kg{font-size:20px;font-weight:700}
.ms-sub{font-size:10px;color:var(--muted);margin-top:2px}
.ms-prog{margin-top:10px}
.ms-plbl{display:flex;justify-content:space-between;margin-bottom:4px;font-size:11px}
.ms-pbar{height:8px;background:var(--b1);border-radius:4px;overflow:hidden}
.ms-pfill{height:100%;background:linear-gradient(90deg,var(--gold),var(--green));border-radius:4px;transition:width .6s}

/* ITI */
.iti-hero{background:linear-gradient(135deg,#1a0810,#120a0e);border:1px solid #6b2a3a;border-radius:var(--r);padding:20px;text-align:center;margin-bottom:14px}
.iti-opt{background:var(--p2);border:1px solid var(--b2);border-radius:var(--r2);padding:12px;margin-bottom:8px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:12px}
.iti-opt.sel{background:#1a120a;border-color:var(--gold)}
.iti-opt-ic{font-size:24px;flex-shrink:0}
.iti-opt-txt{flex:1}
.iti-opt-name{font-size:13px;font-weight:600}
.iti-opt-desc{font-size:11px;color:var(--muted);margin-top:2px}
.iti-opt-chk{font-size:18px;color:var(--gold)}

/* NOTIF */
.notif-bar{background:linear-gradient(135deg,#1a1a06,#12120a);border:1px solid var(--gold);border-radius:10px;padding:11px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;gap:10px}

/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--gold);color:#0a0a0f;padding:10px 22px;border-radius:20px;font-size:13px;font-weight:700;z-index:999;opacity:0;transition:all .35s;white-space:nowrap;pointer-events:none;font-family:var(--ff)}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* POPUP */
#pop{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;z-index:500;padding:20px}
#pop.on{display:flex}
.pop-box{background:linear-gradient(160deg,#1e1a06,#0f0d08);border:2px solid var(--gold);border-radius:var(--r3);padding:32px;text-align:center;max-width:320px;width:100%;animation:popIn .4s ease}
@keyframes popIn{from{transform:scale(.6) rotate(-3deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}

/* WEIGH BOX */
.wb{background:#140f04;border:1px solid var(--gold);border-radius:var(--r2);padding:12px;margin-bottom:10px}

/* PHASE BADGE */
.pbadge{display:inline-block;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0a0a0f;font-size:10px;font-weight:700;padding:3px 10px;border-radius:10px;margin-bottom:8px}
.lkbadge{display:inline-block;background:var(--b1);color:var(--muted);font-size:10px;font-weight:600;padding:3px 10px;border-radius:10px;margin-bottom:8px}

/* HOTEL BANNER */
.htl-bar{background:#120a04;border:1px solid var(--gold);border-radius:10px;padding:10px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}

/* DIVIDER */
.dvd{height:1px;background:var(--b1);margin:10px 0}

/* KCAL BAR */
.kb{height:10px;background:var(--b1);border-radius:5px;overflow:hidden;margin-top:6px}
.kf{height:100%;border-radius:5px;transition:width .4s}
.kf-ok{background:linear-gradient(90deg,var(--green),var(--gold))}
.kf-ov{background:var(--red)}

/* DROPDOWN */
.dd-wrap{position:relative;margin-bottom:8px}
.dd-menu{position:absolute;top:100%;left:0;right:0;background:var(--p2);border:1px solid var(--b2);border-radius:var(--r2);z-index:50;max-height:220px;overflow-y:auto;display:none;scrollbar-width:none}
.dd-menu.open{display:block}
.dd-item{padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--b1);transition:background .15s}
.dd-item:active{background:var(--b1)}
.dd-n{font-size:13px;color:var(--text)}
.dd-c{font-size:11px;color:var(--gold);margin-top:2px}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="hdr-row">
      <div>
        <div class="hdr-title">Divy's Journey</div>
        <div class="hdr-family">Iti · Chittu · and you</div>
      </div>
      <div>
        <div class="hdr-wt" id="h-wt">98 kg</div>
        <div class="hdr-goal">Goal: 75 kg</div>
      </div>
    </div>
    <div class="mode-row">
      <div class="mode-tog">
        <button id="mb-h" class="mhome" onclick="setMode('home')">🏠 Home</button>
        <button id="mb-t" onclick="setMode('hotel')">🏨 Hotel</button>
        <button id="mb-i" onclick="setMode('intl')">✈️ Intl</button>
      </div>
      <div class="hdr-date" id="h-date"></div>
    </div>
    <div class="prog-wrap">
      <div class="prog-row">
        <span>98 kg</span>
        <span class="prog-pct" id="h-pct">0%</span>
        <span>75 kg</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="h-pb" style="width:0%"></div></div>
    </div>
  </div>

  <div id="tabs">
    <button class="tb on" onclick="goTab('home')">🏠 Home</button>
    <button class="tb" onclick="goTab('cal')">📅 Calendar</button>
    <button class="tb" onclick="goTab('body')">📊 Body</button>
    <button class="tb" onclick="goTab('goals')">🎯 Goals</button>
    <button class="tb" onclick="goTab('rewards')">🎁 Rewards</button>
  </div>

  <div id="body"></div>
</div>

<!-- FLOATING CHAT BUTTON -->
<button id="chat-btn" onclick="toggleChat()" style="
  position:fixed;bottom:24px;right:20px;z-index:400;
  width:54px;height:54px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  border:none;cursor:pointer;
  box-shadow:0 4px 20px rgba(212,168,67,0.5);
  font-size:24px;display:flex;align-items:center;justify-content:center;
  transition:all .3s;font-family:var(--ff)
">✦</button>

<!-- CHAT PANEL -->
<div id="chat-panel" style="
  position:fixed;inset:0;z-index:450;
  background:rgba(0,0,0,.85);
  display:none;flex-direction:column;
  ">
  <div style="
    position:absolute;bottom:0;left:0;right:0;
    max-width:480px;margin:0 auto;
    background:linear-gradient(160deg,#1a1a0a,#0f0d08);
    border-top:1px solid var(--gold);border-radius:20px 20px 0 0;
    display:flex;flex-direction:column;
    height:82vh;
    ">
    <!-- Chat header -->
    <div style="padding:14px 16px 10px;border-bottom:1px solid var(--b1);display:flex;justify-content:space-between;align-items:center;flex-shrink:0">
      <div>
        <div style="font-family:var(--fs);font-size:18px;color:var(--gold)">✦ Divy's Companion</div>
        <div style="font-size:10px;color:var(--sub);margin-top:1px">Knows your chart · your meds · your journey</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <div id="chat-key-btn"></div>
        <button onclick="toggleChat()" style="background:var(--b1);border:none;color:var(--muted);border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;font-family:var(--ff)">✕</button>
      </div>
    </div>
    <!-- Messages -->
    <div id="chat-msgs" style="flex:1;overflow-y:auto;padding:14px;scrollbar-width:none;display:flex;flex-direction:column;gap:10px"></div>
    <!-- Input -->
    <div style="padding:12px;border-top:1px solid var(--b1);display:flex;gap:8px;flex-shrink:0;background:#0f0d08">
      <textarea id="chat-input" placeholder="Talk to me..." rows="2" style="
        flex:1;background:var(--p2);border:1px solid var(--b2);border-radius:10px;
        padding:10px 12px;color:var(--text);font-size:13px;font-family:var(--ff);
        resize:none;outline:none;line-height:1.5;
        -webkit-user-select:text;user-select:text
      " onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat();}"></textarea>
      <button onclick="sendChat()" id="chat-send" style="
        background:linear-gradient(135deg,var(--gold),var(--gold2));
        border:none;border-radius:10px;padding:0 16px;
        color:#0a0a0f;font-size:18px;cursor:pointer;flex-shrink:0
      ">↑</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<div id="pop">
  <div class="pop-box">
    <div style="font-size:60px;margin-bottom:12px">🏆</div>
    <div style="font-family:var(--fs);font-size:24px;color:var(--gold);margin-bottom:6px">MILESTONE!</div>
    <div style="font-size:30px;font-weight:700;color:var(--green);margin-bottom:10px" id="pop-kg"></div>
    <div style="font-size:13px;color:var(--sub);line-height:1.7;margin-bottom:20px">

// ── Cloud sync for Iti rewards ──
async function itiPush(){
  if(!ITI_SYNC_BIN||!ITI_SYNC_KEY) return;
  try{
    // Store only rewards and pw hash — never plain password
    const payload={rewards:ITI_D.rewards,pwHash:btoa(ITI_D.pw),msgs:ITI_MSGS,updated:new Date().toISOString()};
    await fetch('https://api.jsonbin.io/v3/b/'+ITI_SYNC_BIN,{
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':ITI_SYNC_KEY,'X-Bin-Private':'true'},
      body:JSON.stringify(payload)
    });
  }catch(e){console.log('Sync push failed',e);}
}

async function itiPull(){
  if(!ITI_SYNC_BIN||!ITI_SYNC_KEY) return false;
  try{
    const res=await fetch('https://api.jsonbin.io/v3/b/'+ITI_SYNC_BIN+'/latest',{
      headers:{'X-Master-Key':ITI_SYNC_KEY}
    });
    if(!res.ok) return false;
    const data=await res.json();
    const rec=data.record;
    if(rec&&rec.rewards){
      ITI_D.rewards=rec.rewards;
      if(rec.pwHash) ITI_D.pw=atob(rec.pwHash);
      if(rec.msgs) ITI_MSGS=rec.msgs;
      saveS('dv4-iti',ITI_D);
      saveS('dv4-iti-msgs',ITI_MSGS);
      return true;
    }
  }catch(e){console.log('Sync pull failed',e);}
  return false;
}

  ITI_SYNC_BIN=binId;ITI_SYNC_KEY=masterKey;
  localStorage.setItem('dv4-iti-bin',binId);
  localStorage.setItem('dv4-iti-bkey',masterKey);
  await itiPush();
  flash('Cloud sync enabled 💝');
  renderTab('rewards');
}

function loadS(k,def){
  try{
    const d=localStorage.getItem(k);
    if(!d) return def;
    const parsed=JSON.parse(d);
    // If default is array, return parsed array directly
    if(Array.isArray(def)) return Array.isArray(parsed)?parsed:def;
    // If default is object, merge
    return typeof parsed==='object'&&parsed!==null?{...def,...parsed}:def;
  }catch(e){return def;}
}

function getTodayStr(){

  // Use local date not UTC — toISOString() gives UTC which is wrong for IST (+5:30)
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

  if(newD.getMonth()!==CAL_MONTH.getMonth()||newD.getFullYear()!==CAL_MONTH.getFullYear()){
    CAL_MONTH=new Date(newD.getFullYear(),newD.getMonth(),1);

  const na=parseInt(document.getElementById('cf-na')?document.getElementById('cf-na').value:0)||0;

  }

    p:Math.round(p*ratio*10)/10,c:Math.round(c*ratio*10)/10,f:Math.round(fv*ratio*10)/10,

function delFood(idx){
  FOOD_LOG.splice(idx,1);saveFood();
  if(CUR==='cal') renderTab('cal');
  else renderTab('food');
}

function renderTab(t){
  checkDateRollover();
  autoTickIfComplete();
  // Lock rewards when navigating away
  if(t!=='rewards'&&CUR==='rewards') ITI_OPEN=false;
  try{
    let html='';
    if(t==='home') html=rHome();
    else if(t==='cal') html=CAL_VIEW_DATE?rCalDay(CAL_VIEW_DATE):rCal();
    else if(t==='body') html=rBody();
    else if(t==='goals') html=rGoals();
    else if(t==='rewards') html=rRewards();
    document.getElementById('body').innerHTML=html;
  }catch(e){
    document.getElementById('body').innerHTML='<div class="c"><div style="color:var(--red);font-size:12px;font-family:sans-serif">Tab error: '+e.message+'</div></div>';
    console.error('Tab error:',t,e);
  }
}

// CALENDAR
function rCal(){
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const d=new Date(CAL_MONTH.getFullYear(),CAL_MONTH.getMonth(),1);
  const firstDay=d.getDay();
  const daysInMonth=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
  const todayStr=getTodayStr();
  const startD=new Date(START_DATE);

  let grid='<div class="cal-grid">';
  ['S','M','T','W','T','F','S'].forEach(d=>grid+=`<div class="cal-day-hdr">${d}</div>`);
  for(let i=0;i<firstDay;i++)grid+=`<div class="cal-day empty"></div>`;

  for(let day=1;day<=daysInMonth;day++){
    const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const dt=new Date(ds);
    const isToday=ds===todayStr;
    const isStart=ds===START_DATE;
    const isPrep=ds>=PREP_START&&ds<START_DATE;
    const isPast=dt<new Date(todayStr)&&!isToday;
    const isFuture=dt>new Date(todayStr);
    const calEntry=S.calData[ds];

    let cls='cal-day';
    const comp=getDayCompletion(ds);
    const tripDay=getTripForDate(ds);
    const hasSomeActivity=comp.total>0;

    if(isToday) cls+=' today';
    else if(isStart) cls+=' start';
    else if(isPast&&hasSomeActivity&&comp.pass) cls+=isPrep?' prep-done':' done';
    else if(isPast&&hasSomeActivity&&!comp.pass&&ds>=PREP_START) cls+=' skipped';
    else if(isPrep&&!isPast) cls+=' prep';
    else if(isFuture) cls+=' future';
    else cls+=' future';

    const dot=S.weights[ds]?'<div class="cal-dot"></div>':'';
    const prepDot=isPrep?'<div style="position:absolute;top:2px;right:3px;width:4px;height:4px;border-radius:50%;background:#60b0e0;opacity:0.7"></div>':'';
    const travelDot=tripDay?`<div style="position:absolute;top:2px;left:3px;width:4px;height:4px;border-radius:50%;background:${tripDay.type==='international'?'var(--blue)':'var(--orange)'};opacity:0.8"></div>`:'';
    const clickable=true;
    grid+=`<div class="${cls}" style="position:relative;cursor:pointer" onclick="CAL_VIEW_DATE='${ds}';CAL_DAY_TAB='schedule';renderTab('cal')">${day}${dot}${prepDot}${travelDot}</div>`;
  }
  grid+='</div>';

  const prev=new Date(CAL_MONTH);prev.setMonth(prev.getMonth()-1);
  const next=new Date(CAL_MONTH);next.setMonth(next.getMonth()+1);

  return `
    <div class="c">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <button class="btn btn-dim btn-sm" onclick="CAL_MONTH=new Date(${prev.getFullYear()},${prev.getMonth()},1);renderTab('cal')">←</button>
        <div style="font-size:15px;font-weight:700;color:var(--gold)">${months[d.getMonth()]} ${d.getFullYear()}</div>
        <button class="btn btn-dim btn-sm" onclick="CAL_MONTH=new Date(${next.getFullYear()},${next.getMonth()},1);renderTab('cal')">→</button>
      </div>
      ${grid}
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px">
        ${[
          ['done','var(--green2)','var(--green)','Done'],
          ['today','var(--gold)','#0a0a0f','Today'],
          ['skipped','#3a1a1a','var(--red)','Missed'],
          ['start','var(--b1)','var(--gold)','Mar 28 Start'],
          ['prep','#0a1a2a','#60b0e0','Prep (23–27)'],
          ['prep-done','#0a2a1a','#50a070','Prep Done'],
        ].map(([,bg,col,lbl])=>`
          <div style="display:flex;align-items:center;gap:5px">
            <div style="width:12px;height:12px;border-radius:3px;background:${bg};border:1px solid ${col}"></div>
            <span style="font-size:10px;color:var(--muted)">${lbl}</span>
          </div>`).join('')}
        <div style="display:flex;align-items:center;gap:5px">
          <div style="width:8px;height:8px;border-radius:50%;background:var(--gold)"></div>
          <span style="font-size:10px;color:var(--muted)">Weight logged</span>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        ${[
          ['Day',daysSinceStart()+' of journey'],

          ['Lost',Math.max(0,SW-S.wt).toFixed(1)+' kg so far'],
        ].map(([l,v])=>`<div style="background:var(--p2);border-radius:8px;padding:10px">
          <div style="font-size:10px;color:var(--muted)">${l}</div>
          <div style="font-size:14px;font-weight:700;color:var(--gold);margin-top:2px">${v}</div>

// WATER

  const glasses=Math.floor(ml/250);
  const totalGlasses=14;

  let drops='';
  for(let i=0;i<totalGlasses;i++){
    drops+=`<div class="wd ${i<glasses?'full':''}"></div>`;
  }

  const labels=[
    {pct:25,ml:'625ml'},{pct:50,ml:'1.25L'},{pct:75,ml:'1.875L'},{pct:100,ml:'2.5L'}
  ];

  return `
    <div class="c" style="text-align:center">
      <div class="ctitle">Daily Hydration</div>
      <div class="water-wrap">
        <div class="water-bottle">
          <div class="wb-outer">
            <div class="wb-fill" style="height:${fillPct}%"></div>
            <div class="wb-lines">
              ${[0,1,2,3,4,5,6,7,8].map(()=>'<div class="wb-line"></div>').join('')}
            </div>
            ${labels.map(l=>`<div class="wb-label" style="bottom:calc(${l.pct}% - 8px)">${l.ml}</div>`).join('')}
          </div>
        </div>
        <div class="water-info">
          <div class="water-ml">${ml>=1000?(ml/1000).toFixed(2)+'L':ml+'ml'}</div>
          <div class="water-target">${glasses} of ${totalGlasses} glasses · Target 2.5L</div>
        </div>
        <div class="water-btns">
          <button class="water-add" onclick="addWater()">+ 250ml</button>
          <button class="water-reset" onclick="resetWater()">Reset</button>

        <div class="water-drops">${drops}</div>
      </div>
    </div>

    <div class="c c-blue">
      <div class="ctitle">Why This Matters</div>
      <div style="font-size:12px;color:var(--sub);line-height:1.9">
        Consistent hydration reduces fluid retention and facial puffiness faster than any other single change.<br><br>
        Spread through the day — a glass on waking, one with each meal, one between meals. Never gulp large amounts at once.<br><br>
        <span style="color:var(--teal)">On travel days:</span> Always carry your bottle. Hotel rooms are dehydrating.

  `;
}

// GOALS
function rGoals(){
  const mCards=MILESTONES.map((ms,i)=>{
    const prev=MILESTONES[i-1]||SW;
    const done=S.unlocked.includes(ms);
    const cur=S.wt>ms&&S.wt<=prev;
    const p=cur?Math.min(100,Math.round(((prev-S.wt)/(prev-ms))*100)):0;
    const cls='ms'+(done?' ms-d':cur?' ms-c':'');
    const reward=ITI_D.rewards&&ITI_D.rewards[ms];
    const rewardLabel=reward?reward.split(':').slice(1).join(':'):'';

    return `<div class="${cls}">
      <div class="ms-row">
        <div>
          <div class="ms-kg" style="color:${done?'var(--green)':cur?'var(--gold)':'var(--dim)'}">${done?'✅':cur?'🎯':'🔒'} ${ms} kg</div>
          <div class="ms-sub">Lose ${SW-ms} kg total${ms===75?' · Final Goal':''}</div>
        </div>
        <div style="font-size:${done&&rewardLabel?11:20}px">
          ${done&&rewardLabel?`<span style="color:var(--green);max-width:120px;display:block;text-align:right">${esc(rewardLabel)}</span>`:'🎁'}
        </div>
      </div>
      ${cur?`<div class="ms-prog">
        <div class="ms-plbl">
          <span style="color:var(--gold)">${p}% there</span>
          <span style="color:var(--muted)">${(S.wt-ms).toFixed(1)} kg to go</span>
        </div>
        <div class="ms-pbar"><div class="ms-pfill" style="width:${p}%"></div></div>
      </div>`:''}
    </div>`;
  }).join('');

  return `
    <div class="c" style="text-align:center">
      <div style="font-size:13px;color:var(--sub)">Today</div>
      <div style="font-size:40px;font-weight:700;color:var(--gold)">${S.wt} kg</div>
      <div style="font-size:14px;color:var(--green)">${(S.wt-GW).toFixed(1)} kg to the finish line</div>
    </div>

    ${mCards}

    <div class="c">
      <div class="ctitle">Activity Unlocks</div>
      ${[[92,'Cycling begins — 20 min flat route'],[89,'Kettlebell + cycling 30 min'],[85,'Full strength circuit 3x/week'],[82,'Full lake circle · Cycling tour with Iti'],[75,'Everything open — you made it, Divy']].map(([kg,d])=>`
        <div style="display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--b1);align-items:flex-start">
          <span>${S.wt<=kg?'✅':'🔒'}</span>
          <div style="font-size:12px"><span style="color:var(--gold);font-weight:700">${kg} kg: </span><span style="color:var(--sub)">${d}</span></div>
        </div>`).join('')}
    </div>

    <div class="c c-gold">
      <div class="ctitle">Dynamic Timeline Projection</div>
      ${(()=>{
        const weights=Object.entries(S.weights).sort((a,b)=>a[0].localeCompare(b[0]));
        if(weights.length<2){
          return `<div style="font-size:12px;color:var(--sub);line-height:1.9">
            <span style="color:var(--gold)">Log 2+ weigh-ins</span> to see your personalised projection.<br><br>
            <span style="color:var(--gold)">Weeks 1–3:</span> Less bloating, better sleep. 1–2kg water weight.<br>
            <span style="color:var(--gold)">Month 2–3:</span> 0.5–1kg/month true fat loss begins.<br>
            <span style="color:var(--gold)">Month 4–6:</span> 2–4kg genuine. Waist shifting.<br>
            <span style="color:var(--gold)">Month 8–12:</span> 5–8kg. Belly reducing. Face changing.<br>
            <span style="color:var(--gold)">18–24 months:</span> 75kg is yours, Divy.
          </div>`;
        }
        // Calculate rate from last 3 weigh-ins
        const recent=weights.slice(-3);
        const days=(new Date(recent[recent.length-1][0])-new Date(recent[0][0]))/(1000*60*60*24)||1;
        const lost=recent[0][1]-recent[recent.length-1][1];
        const ratePerDay=lost/days;
        const ratePerWeek=(ratePerDay*7).toFixed(2);
        const ratePerMonth=(ratePerDay*30).toFixed(1);

        if(ratePerDay<=0){
          return `<div style="font-size:12px;color:var(--sub)">Current rate: <span style="color:var(--red)">not losing yet</span>. The plan starts working from March 28. Check back after your first weigh-in.</div>`;
        }

        const projections=MILESTONES.filter(ms=>ms<S.wt).map(ms=>{
          const kgToLose=S.wt-ms;
          const daysNeeded=Math.round(kgToLose/ratePerDay);
          const eta=new Date();eta.setDate(eta.getDate()+daysNeeded);
          const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
          const etaStr=eta.getDate()+' '+months[eta.getMonth()]+' '+eta.getFullYear();
          const already=S.unlocked.includes(ms);
          return `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #2a1e06">
            <span style="font-size:13px;font-weight:700;color:${already?'var(--green)':'var(--gold)'}">${already?'✅':''} ${ms}kg</span>
            <span style="font-size:12px;color:${already?'var(--green)':'var(--sub)'}">${already?'Achieved!':etaStr}</span>
          </div>`;
        }).join('');

        return `<div style="font-size:11px;color:var(--sub);margin-bottom:10px">
          Rate: <strong style="color:var(--gold)">${ratePerWeek}kg/week</strong> · ${ratePerMonth}kg/month · based on last ${recent.length} weigh-ins
        </div>${projections}
        <div style="font-size:10px;color:var(--muted);margin-top:8px">Projections update automatically as you log more weigh-ins.</div>`;
      })()}
    </div>
  `;
}

function logMeasurement(){
  const fields=['wt','sh','ch','wa','hi','th','lg','bi'];
  const vals={};
  fields.forEach(f=>{
    const el=document.getElementById('bm-'+f);
    if(el&&el.value) vals[f]=parseFloat(el.value)||null;

  if(!vals.wt&&!vals.wa){flash('Enter at least weight or waist');return;}

}

// Measurement targets for Divy at 184cm goal-weight 75kg
const MEAS_TARGETS={
  wt:  {label:'Weight',    unit:'kg', current:98, target:75,  max:120, better:'down', color:'var(--gold)'},
  wa:  {label:'Waist',     unit:'cm', current:42, target:32,  max:55,  better:'down', color:'var(--red)'},
  ch:  {label:'Chest',     unit:'cm', current:46, target:44,  max:60,  better:'down', color:'var(--blue)'},
  hi:  {label:'Hip',       unit:'cm', current:46, target:40,  max:60,  better:'down', color:'var(--orange)'},
  th:  {label:'Thigh',     unit:'cm', current:28, target:24,  max:40,  better:'down', color:'var(--purple)'},
  sh:  {label:'Shoulder',  unit:'cm', current:50, target:50,  max:60,  better:'same', color:'var(--teal)'},
  bi:  {label:'Bicep',     unit:'cm', current:16, target:18,  max:25,  better:'up',   color:'var(--green)'},
  lg:  {label:'Calf',      unit:'cm', current:17, target:16,  max:28,  better:'down', color:'var(--sub)'},
};

function rBody(){
  const ms=BODY_LOG.measurements;
  const latest=ms[0]||null;
  const prev=ms[1]||null;

  function chg(key,unit){
    if(!latest||!prev||!latest[key]||!prev[key])return '';
    const d=(latest[key]-prev[key]).toFixed(1);
    const t=MEAS_TARGETS[key];
    const good=t?( t.better==='down'?d<0 : t.better==='up'?d>0 : Math.abs(d)<1 ):d<0;
    return '<span style="color:'+(good?'var(--green)':'var(--red)')+';font-size:10px;margin-left:5px">'+(d>0?'+':'')+d+unit+'</span>';
  }

  const bmi=latest&&latest.bmi?latest.bmi:null;
  const bmiCol=bmi?bmi>30?'var(--red)':bmi>25?'var(--orange)':'var(--green)':'var(--muted)';
  const bmiLbl=bmi?bmi>35?'Obese III':bmi>30?'Obese II':bmi>27?'Obese I':bmi>25?'Overweight':bmi>18.5?'Healthy':'Underweight':'';

  // Build measurement bar charts
  function measBar(key){
    const t=MEAS_TARGETS[key];
    const val=latest&&latest[key]?latest[key]:t.current;
    const prev_val=prev&&prev[key]?prev[key]:null;
    const pct=Math.min(100,Math.max(0,Math.round(((t.max-val)/(t.max-t.target))*100)));
    const onTarget=t.better==='down'?val<=t.target:t.better==='up'?val>=t.target:Math.abs(val-t.target)<=2;
    const barCol=onTarget?'var(--green)':t.better==='down'&&val>t.target*1.15?'var(--red)':t.color;
    const diff=prev_val?parseFloat((val-prev_val).toFixed(1)):null;
    const diffGood=diff!==null?(t.better==='down'?diff<0:t.better==='up'?diff>0:Math.abs(diff)<1):null;
    return `
      <div style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">
          <div style="font-size:12px;font-weight:600;color:var(--text)">${t.label}</div>
          <div style="display:flex;align-items:baseline;gap:6px">
            ${diff!==null?`<span style="font-size:10px;color:${diffGood?'var(--green)':'var(--red)'}">${diff>0?'+':''}${diff}${t.unit}</span>`:''}
            <span style="font-size:14px;font-weight:700;color:${barCol}">${val}${t.unit}</span>
            <span style="font-size:10px;color:var(--muted)">→${t.target}${t.unit}</span>
          </div>
        </div>
        <div style="height:8px;background:var(--b1);border-radius:4px;overflow:hidden;position:relative">
          <div style="position:absolute;right:0;top:0;bottom:0;width:2px;background:var(--green);opacity:0.4;border-radius:2px"></div>
          <div style="height:100%;width:${pct}%;background:${barCol};border-radius:4px;transition:width .5s ease;max-width:100%"></div>
        </div>
        <div style="font-size:9px;color:var(--muted);margin-top:2px;text-align:right">Target: ${t.target}${t.unit} · Max range: ${t.max}${t.unit}</div>
      </div>`;
  }

  const val=k=>latest&&latest[k]?latest[k]:'';

  // Holistic guidance from latest or defaults
  const hm={
    wa:latest&&latest.wa||42,
    ch:latest&&latest.ch||46,
    hi:latest&&latest.hi||46,
    bi:latest&&latest.bi||16,
  };

  const historyRows=ms.length===0
    ?'<div style="font-size:12px;color:var(--muted)">No measurements yet. Log on Day 8 of each cycle.</div>'
    :ms.map(m=>'<div style="padding:10px 0;border-bottom:1px solid var(--b1)"><div style="font-size:11px;color:var(--sub);margin-bottom:5px">'+m.date+(m.bmi?' · <span style="color:'+(m.bmi>30?'var(--red)':m.bmi>25?'var(--orange)':'var(--green)')+'">BMI '+m.bmi+'</span>':'')+'</div><div style="display:flex;gap:10px;flex-wrap:wrap">'
      +(m.wt?'<span style="font-size:11px"><span style="color:var(--muted)">Wt </span><b style="color:var(--gold)">'+m.wt+'kg</b></span>':'')
      +(m.wa?'<span style="font-size:11px"><span style="color:var(--muted)">Waist </span><b style="color:var(--blue)">'+m.wa+'cm</b></span>':'')
      +(m.ch?'<span style="font-size:11px"><span style="color:var(--muted)">Chest </span><b style="color:var(--sub)">'+m.ch+'cm</b></span>':'')
      +(m.hi?'<span style="font-size:11px"><span style="color:var(--muted)">Hip </span><b style="color:var(--sub)">'+m.hi+'cm</b></span>':'')
      +(m.th?'<span style="font-size:11px"><span style="color:var(--muted)">Thigh </span><b style="color:var(--sub)">'+m.th+'cm</b></span>':'')
      +'</div></div>').join('');

  return `
    <!-- BMI CARD -->
    <div class="c" style="text-align:center;background:var(--p2);border-color:var(--gold)">
      <div class="ctitle">Body Stats · ${latest?latest.date:'No data yet'}</div>
      ${bmi?`
        <div style="font-size:36px;font-weight:700;color:${bmiCol};font-family:var(--ff)">${bmi}</div>
        <div style="font-size:13px;color:${bmiCol};margin-bottom:8px">${bmiLbl}</div>
        <div style="font-size:11px;color:var(--muted)">Height 184cm · Target BMI 22–24</div>
      `:'<div style="font-size:12px;color:var(--muted);padding:10px">Log your weight below to calculate BMI</div>'}
    </div>

    <!-- WEIGHT SPARKLINE TREND -->
    ${ms.length>=2?`
    <div class="c">
      <div class="ctitle">Weight Trend</div>
      <div style="position:relative;height:80px;margin-bottom:6px">
        ${(()=>{
          const pts=ms.slice(0,12).reverse();

          if(weights.length<2) return '<div style="color:var(--muted);font-size:11px">Log more readings</div>';
          const mn=Math.min(...weights)-0.5,mx=Math.max(...weights)+0.5,rng=mx-mn||1;
          const w=100/Math.max(weights.length-1,1);
          const pts2=weights.map((v,i)=>`${(i*w).toFixed(1)},${(100-((v-mn)/rng*100)).toFixed(1)}`).join(' ');
          const diff=(weights[weights.length-1]-weights[0]).toFixed(1);
          const good=diff<0;
          return `<svg width="100%" height="80" viewBox="0 0 100 100" preserveAspectRatio="none" style="position:absolute;inset:0">
            <polyline points="${pts2}" fill="none" stroke="${good?'var(--green)':'var(--red)'}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <text x="1" y="12" font-size="6" fill="#6a6050">${mx.toFixed(1)}kg</text>

          </svg>
          <div style="position:absolute;top:4px;right:4px;font-size:12px;font-weight:700;color:${good?'var(--green)':'var(--red)'}">${diff>0?'+':''}${diff}kg</div>`;
        })()}
      </div>
      <div style="font-size:10px;color:var(--muted);text-align:center">Last ${Math.min(ms.length,12)} weigh-ins</div>
    </div>`:''}

    <!-- WAIST SPARKLINE -->
    ${ms.filter(m=>m.wa).length>=2?`
    <div class="c">
      <div class="ctitle">Waist Trend</div>
      <div style="position:relative;height:60px;margin-bottom:4px">
        ${(()=>{
          const pts=ms.filter(m=>m.wa).slice(0,10).reverse();
          const vals=pts.map(m=>m.wa);
          const mn=Math.min(...vals)-1,mx=Math.max(...vals)+1,rng=mx-mn||1;
          const w=100/Math.max(vals.length-1,1);
          const pts2=vals.map((v,i)=>`${(i*w).toFixed(1)},${(100-((v-mn)/rng*100)).toFixed(1)}`).join(' ');
          const diff=(vals[vals.length-1]-vals[0]).toFixed(1);
          const good=diff<0;
          return `<svg width="100%" height="60" viewBox="0 0 100 100" preserveAspectRatio="none" style="position:absolute;inset:0">
            <polyline points="${pts2}" fill="none" stroke="${good?'var(--green)':'var(--red)'}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <text x="1" y="12" font-size="7" fill="#6a6050">${mx}cm</text>
            <text x="1" y="96" font-size="7" fill="#6a6050">${mn}cm</text>
          </svg>
          <div style="position:absolute;top:4px;right:4px;font-size:12px;font-weight:700;color:${good?'var(--green)':'var(--red)'}">${diff>0?'+':''}${diff}cm</div>`;
        })()}
      </div>
    </div>`:''}

    <!-- PROGRESS PHOTOS -->
    <div class="c">
      <div class="ctitle">📸 Progress Photos</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:10px">Private · stored only on this device. One photo per milestone moment.</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px">
        ${['Start','95kg','92kg','89kg','85kg','82kg','79kg','75kg'].map(slot=>{
          const photo=PHOTOS[slot];
          return `<div style="aspect-ratio:1;border-radius:8px;overflow:hidden;position:relative;background:var(--p2);border:1px solid ${photo?'var(--gold)':'var(--b2)'};cursor:pointer" onclick="document.getElementById('ph-${slot}').click()">
            ${photo
              ?`<img src="${photo}" style="width:100%;height:100%;object-fit:cover"/><div style="position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.6);font-size:8px;color:var(--gold);padding:2px;text-align:center">${slot}</div>`
              :`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:2px"><div style="font-size:16px">📷</div><div style="font-size:8px;color:var(--muted);text-align:center">${slot}</div></div>`}

    <!-- COMPARISON GRID -->
    ${latest?`
    <div class="c">

function saveJournal(){saveS('dv4-journal',JOURNAL);}

function saveJournalEntry(){
  const text=document.getElementById('j-entry').value.trim();
  if(!text){flash('Write something first');return;}
  const weekKey=getWeekKey();
  JOURNAL.entries[weekKey]={text,date:TODAY,saved:new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})};
  saveJournal();flash('Saved ✓');renderTab('journal');
}

function getWeekKey(){
  const d=new Date(TODAY);
  const day=d.getDay();
  const diff=d.getDate()-day+(day===0?-6:1);
  const mon=new Date(d.setDate(diff));
  return mon.toISOString().split('T')[0];
}

function getWeekLabel(key){
  const d=new Date(key);
  const end=new Date(key);end.setDate(end.getDate()+6);
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${d.getDate()} ${months[d.getMonth()]} – ${end.getDate()} ${months[end.getMonth()]}`;
}

function isWednesday(){return new Date().getDay()===3;}

// ═══════════ DAY LOCK ═══════════
function checkDayLock(){
  const d=new Date();d.setDate(d.getDate()-1);
  const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');
  const yd=`${y}-${m}-${day}`;
  if(yd<PREP_START) return false; // before journey
  if(DAY_LOCK.lastDate===TODAY) return false; // already handled today
  if(d.getDay()===0) return false; // Sunday — 60% threshold, no lock needed
  const comp=getDayCompletion(yd);
  if(comp.pass) return false; // passed threshold = no lock
  return yd;
}

function resolvelock(reason){
  const lockDate=checkDayLock();
  if(!lockDate){flash('All good!');return;}
  const grace=['travel','health','work'];
  if(grace.includes(reason)){
    S.calData[lockDate]='grace-'+reason;
    DAY_LOCK={lastDate:TODAY,reason};
    saveS('dv4-lock',DAY_LOCK);
    flash('Grace noted. Streak protected.');
  } else {
    // forfeit — push current cycle reward to next
    S.streak=Math.max(0,S.streak-1);
    S.calData[lockDate]='skipped';
    DAY_LOCK={lastDate:TODAY,reason:'forfeit'};
    saveS('dv4-lock',DAY_LOCK);
    flash('Honest. One reward deferred. Streak resets.');
  }
  saveMain();
  document.getElementById('lock-modal').style.display='none';
  renderTab('home');
}

// ═══════════ CALENDAR DAY VIEW ═══════════
function getDayCompletion(dateStr){
  // Cache management
  if(_compCacheDate!==TODAY){_compCache={};_compCacheDate=TODAY;}
  const d=new Date(TODAY);d.setDate(d.getDate()-7);
  const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');
  const isOld=dateStr<`${y}-${m}-${day}`;
  if(isOld&&_compCache[dateStr]) return _compCache[dateStr];

  const isToday=dateStr===TODAY;
  const dayChecks=isToday?CHECKS:loadS('dv4-ch-'+dateStr,{});
  const isPrep=dateStr>=PREP_START&&dateStr<START_DATE;
  const prepDay=isPrep?PREP_DAYS[dateStr]:null;
  const trip=getTripForDate(dateStr);
  let effectiveMode=S.mode;
  if(trip) effectiveMode=trip.type==='international'?'intl':trip.type==='domestic'?'hotel':'home';

  // ── PILLAR 1: HABITS (pure schedule items only — no duplicates) ──
  const sch=prepDay?prepDay.movement:effectiveMode==='hotel'?SCH_HOTEL:effectiveMode==='intl'?SCH_INTL:SCH_HOME;
  // Meditation items (Morning sit 🧘 + Yoga Nidra 🌙) only count from MEDITATION_START
  const effectiveSch=dateStr>=MEDITATION_START?sch:sch.filter(item=>item.ic!=='🧘'&&item.ic!=='🌙');
  const schTotal=effectiveSch.length;
  const schDone=Math.min(Object.entries(dayChecks).filter(([k,v])=>k.startsWith('d')&&isDone(v)).length, schTotal);

  // ── PILLAR 2: EXERCISE (mandatory minimum: breathwork + morning walk) ──
  // For prep days — exercise is part of schedule items, no separate exercise check
  let exDone=0,exTotal=0,exPass=false;
  if(!isPrep){
    const dayExLog=isToday?EX_LOG:loadS('dv4-ex-'+dateStr,{});
    // Count every individual exercise — no more pass/fail single point
    const availPhases=EX.filter(p=>p.unlockKg===999||S.wt<=p.unlockKg);
    const allExItems=availPhases.flatMap(p=>p.list);
    exTotal=allExItems.length;
    exDone=allExItems.filter(ex=>dayExLog[ex.id]&&dayExLog[ex.id].done).length;
    // Mandatory minimum still tracked for display (not scoring)
    const breathDone=dayExLog['breathwork']&&dayExLog['breathwork'].done;
    const walkDone=dayExLog['walk_lake']&&dayExLog['walk_lake'].done;
    exPass=breathDone&&walkDone;
  }

  // ── PILLAR 3: MEDICATIONS (6 items) ──
  const medsForDay=getMeds(dateStr);
  const medKeys=medsForDay.map(m=>m.k);
  const medDone=medKeys.filter(k=>isDone(dayChecks[k])).length;
  const medTotal=medKeys.length;

  // ── PILLAR 4: SUPPLEMENTS (smart — D3 alternate day aware) ──
  const daySuppsData=isToday?SUPPS:loadS('dv4-supps-'+dateStr,{});
  // D3 alternate day check — count days from PREP_START
  const daysSincePrep=Math.floor((new Date(dateStr)-new Date(PREP_START))/(1000*60*60*24));
  const isD3Day=daysSincePrep%2===0; // even days = D3 day
  const suppKeys=isD3Day
    ?['ubq','fish','vitd','fiber','trunativ','mag']  // D3 day — all 6
    :['ubq','fish','fiber','trunativ','mag'];          // Non D3 day — only 5
  const suppDone=suppKeys.filter(k=>daySuppsData[k]).length;
  const suppTotal=suppKeys.length;

  // ── PILLAR 5: NUTRITION (calories in range) ──
  const dayFood=isToday?FOOD_LOG:loadS('dv4-food-'+dateStr,[]);
  const kcal=Array.isArray(dayFood)?dayFood.reduce((s,f)=>s+(f.kcal||0),0):0;
  const calPass=kcal>=1200&&kcal<=1700?1:0;
  const calTotal=1;

  // ── PILLAR 6: WATER ──
  const dayWater=isToday?WATER.ml:(loadS('dv4-water-'+dateStr,{ml:0}).ml||0);
  const waterPass=dayWater>=2500?1:0;
  const waterTotal=1;

  // Exercise — each item counts individually (no pass/fail single point)
  // Supplements tracked but NOT scored — informational only
  const done=schDone+exDone+medDone+calPass+waterPass;
  const total=schTotal+exTotal+medTotal+calTotal+waterTotal;
  const pct=total>0?Math.round((done/total)*100):0;
  const isSundayDate=new Date(dateStr).getDay()===0;
  const passThreshold=isSundayDate?60:80; // Sunday = 60%, all other days = 80%

  const result={
    done,total,pct,pass:pct>=passThreshold,passThreshold,
    breakdown:{
      sch:{done:schDone,total:schTotal},
      ex:{done:exDone,total:exTotal,pass:exPass,isPrep},
      med:{done:medDone,total:medTotal},
      supp:{done:suppDone,total:suppTotal,isD3Day},
      cal:{done:calPass,total:calTotal,kcal},
      water:{done:waterPass,total:waterTotal,ml:dayWater}
    }
  };
  if(isOld) _compCache[dateStr]=result;
  return result;
}

function markTravel(dateStr,type){
  if(type==='none'){
    TRAVEL.trips=TRAVEL.trips.filter(t=>t.date!==dateStr);
  } else {
    TRAVEL.trips=TRAVEL.trips.filter(t=>t.date!==dateStr);
    TRAVEL.trips.push({date:dateStr,type,dep:'',arr:'',note:'',id:Date.now()});
    TRAVEL.trips.sort((a,b)=>a.date.localeCompare(b.date));
    // Auto set mode if marking today
    if(dateStr===TODAY){
      S.mode=type==='international'?'intl':type==='domestic'?'hotel':'home';
      saveMain();
      updateHeader();
    }
  }
  saveS('dv4-travel',TRAVEL);
  flash(type==='none'?'Travel removed':'Marked as '+type);
  renderTab('cal');
}

        <div style="font-size:20px;margin-bottom:6px">☀️</div>
        <div style="font-size:14px;font-weight:700;color:var(--gold);margin-bottom:4px">Sunday — Rest Day</div>
        <div style="font-size:11px;color:var(--sub);line-height:1.7">Sun's day. Restore, don't deplete.<br>
        Walk only — easy pace, Jakkur Lake if you wish.<br>
        No band. No rope. No score pressure.<br>
        <span style="color:var(--gold)">60% completion = green today.</span></div>
      </div>`;

    if(isPrep){
      // Prep days — show only that day's movement, no full exercise plan
      html+=`<div style="background:#dceeff;border:1px solid #4a90d0;border-radius:10px;padding:12px;margin-bottom:10px">
        <div style="font-size:11px;font-weight:700;color:#60b0e0;margin-bottom:4px">${prepDay.label}</div>
        <div style="font-size:12px;color:var(--sub)">${prepDay.theme}</div>
      </div>`;
      html+=prepDay.movement.map((item,i)=>`
        <div class="si ${isDone(liveChecks['d'+i])?'dn':''}" ${isToday&&!item.auto?`onclick="toggleCheck('d${i}');renderTab('cal')"`:''} style="cursor:${isToday&&!item.auto?'pointer':'default'}">
          <div class="si-ic">${item.ic}</div>
          <div class="si-inf">
            <div class="si-t" style="color:#60b0e0">${item.t}</div>
            <div class="si-a">${esc(item.a)}</div>
          </div>
          <div class="chk">${isDone(liveChecks['d'+i])?'✓':''}</div>
        </div>`).join('');
      html+=`<div style="margin-top:12px;background:#e0f5e8;border:1px solid #2a5a2a;border-radius:10px;padding:12px">
        <div style="font-size:11px;font-weight:700;color:var(--green);margin-bottom:4px">Full exercise plan starts March 28</div>
        <div style="font-size:11px;color:var(--sub)">These 5 prep days build the habit foundation. Movement is intentionally light. Trust the process.</div>
      </div>`;
    } else {

        html+=`<div style="background:linear-gradient(135deg,#e0f5f0,#eaf8f4);border:1px solid #2a5a52;border-radius:10px;padding:12px;margin-bottom:10px">
          <div style="font-size:11px;font-weight:700;color:var(--teal);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">🌊 Jakkur Lake · Yelahanka, Bengaluru</div>
          <div style="font-size:12px;color:var(--sub);line-height:1.9">
            Home to lake: <strong style="color:var(--teal)">700m</strong> · Full circle: <strong style="color:var(--teal)">7km</strong><br>
            <span style="color:var(--green)">Now:</span> Walk there + back = 1.4km<br>
            <span style="color:var(--gold)">92kg:</span> Quarter circle (3.15km total)<br>
            <span style="color:var(--orange)">89kg:</span> Half circle (4.9km total)<br>
            <span style="color:var(--blue)">82kg:</span> Full circle with Iti waiting
          </div>
        </div>`;
      } else {
        html+=`<div style="background:linear-gradient(135deg,#e0f5f0,#eaf8f4);border:1px solid #2a5a52;border-radius:10px;padding:12px;margin-bottom:10px">
          <div style="font-size:11px;font-weight:700;color:var(--teal);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">🚶 Movement — Local Area</div>
          <div style="font-size:12px;color:var(--sub);line-height:1.9">Hotel corridor · Airport terminal · Nearby street<br>
            <span style="color:var(--green)">Minimum:</span> 15 min walk — always possible<br>
            Jakkur Lake resumes at home.
          </div>
        </div>`;
      }
      const dayExLog=isToday?EX_LOG:loadS('dv4-ex-'+dateStr,{});
      const activePhases=EX.filter(p=>p.unlockKg===999||S.wt<=p.unlockKg);
      activePhases.forEach(ph=>{
        html+=`<div class="c" style="margin-bottom:10px"><span class="pbadge">Phase ${ph.ph}: ${ph.name}</span>
          <div style="font-size:12px;color:var(--sub);margin-bottom:10px">${ph.desc}</div>`;
        ph.list.forEach(ex=>{
          const exEntry=dayExLog[ex.id];
          const done=exEntry&&exEntry.done;
          const isRope=ex.id==='rope';
          const timeStamp=done&&exEntry.time?exEntry.time:'';

          if(isRope){
            const sets=(done&&exEntry.sets)||[];
            const best=sets.length?Math.max(...sets):0;
            const level=exEntry?exEntry.level:'building';
            const lCol=level==='good'?'var(--green)':level==='improve'?'var(--orange)':'var(--red)';
            html+=`<div class="c" style="margin-bottom:8px">
              <div style="display:flex;align-items:center;gap:10px;margin-bottom:${(isToday||sets.length>0)?'10px':'0'}">
                <div style="font-size:20px">🪢</div>
                <div style="flex:1">
                  <div style="font-size:13px;font-weight:700;color:var(--text)">Jumping Rope${timeStamp?`<span style="font-size:9px;color:var(--muted);margin-left:6px">@ ${timeStamp}</span>`:''}</div>
                  <div style="font-size:11px;color:var(--sub)">Max reps per set · rest fully between sets</div>
                </div>
                <div style="font-size:12px;font-weight:700;color:var(--gold)">+${ex.pts}</div>
                <div onclick="${isToday?`toggleEx('rope')`:'void 0'}" style="cursor:${isToday?'pointer':'default'};width:28px;height:28px;border-radius:50%;border:2px solid ${done?'var(--green)':'var(--b2)'};background:${done?'#d0f5e0':'transparent'};display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0">${done?'✓':''}</div>
              </div>
              ${sets.length>0?`<div style="background:var(--p2);border-radius:8px;padding:8px;margin-bottom:8px">
                <div style="font-size:10px;color:var(--muted);margin-bottom:6px">Best: <span style="color:${lCol};font-weight:700">${best} reps — ${level==='good'?'🟢 Good':level==='improve'?'🟡 Improving':'🔴 Building'}</span></div>
                <div style="display:flex;flex-wrap:wrap;gap:6px">
                  ${sets.map((r,i)=>`<div style="background:var(--p1);border:1px solid ${r>=40?'var(--green)':r>=20?'var(--orange)':'var(--red)'};border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700;color:${r>=40?'var(--green)':r>=20?'var(--orange)':'var(--red)'}">S${i+1}: ${r}r${isToday?` <span onclick="removeRopeSet(${i})" style="cursor:pointer;color:var(--muted)">✕</span>`:''}</div>`).join('')}
                </div>
              </div>`:''}
              ${isToday?`<div style="display:flex;gap:8px;align-items:center">
                <input id="rope-reps" class="inp" type="number" inputmode="numeric" placeholder="Reps this set" style="flex:1;font-size:20px;font-weight:700;text-align:center;padding:12px;height:52px"/>
                <button onclick="addRopeSet()" class="btn btn-g" style="padding:8px 14px;font-size:12px">+ Set</button>
              </div>
              <div style="font-size:10px;color:var(--muted);margin-top:6px">🟢 40+ reps · 🟡 20-39 · 🔴 under 20</div>`:''}
            </div>`;
          } else {
            const isBand=ex.id.startsWith('band_');
            const rounds=done&&exEntry.rounds!=null?exEntry.rounds:0;
            html+=`<div class="ei ${done?'dn':''}" style="cursor:${isToday?'pointer':'default'}" ${isToday?`onclick="toggleEx('${ex.id}')"`:''}>
              <div class="ei-ic">${ex.ic}</div>
              <div class="ei-inf" style="flex:1">
                <div class="ei-n">
                  ${esc(ex.n)}${timeStamp?`<span style="font-size:9px;color:var(--muted);margin-left:6px">@ ${timeStamp}</span>`:''}
                </div>
                ${isBand&&done&&isToday?`
                <div style="display:flex;gap:6px;margin-top:6px" onclick="event.stopPropagation()">
                  ${[1,2,3].map(r=>`<div onclick="setRounds('${ex.id}',${r})" style="padding:3px 10px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid ${rounds===r?'var(--green)':'var(--b2)'};background:${rounds===r?'#d0f5e0':'var(--p1)'};color:${rounds===r?'#2a6a3a':'var(--muted)'}">${r} round${r>1?'s':''}</div>`).join('')}
                </div>`
                :isBand&&done?`<div style="font-size:10px;color:var(--green);margin-top:3px">${rounds>0?rounds+' round'+(rounds>1?'s':''):'completed'}</div>`
                :`<div class="ei-d">${esc(ex.d)}</div>`}
                <div class="ei-dur">${ex.dur}</div>
              </div>
              <div class="ei-pts">+${ex.pts}</div>
              <div class="chk">${done?'✓':''}</div>
            </div>`;
          }
        });
        html+='</div>';
      });
      // Band guide only on March 28+
      html+=`<div class="c c-blue"><div class="ctitle">🟡 Band Guide</div>
        ${BAND_GUIDE.map(b=>`<div class="bg-ex"><div class="bg-name">${b.n}</div><div class="bg-step">${b.steps}</div></div>`).join('')}
      </div>`;
    }
  }

  // ── FOOD TAB ──
  else if(CAL_DAY_TAB==='food'){
    const dayFood=isToday?FOOD_LOG:loadS('dv4-food-'+dateStr,[]);
    const daySupps=isToday?SUPPS:loadS('dv4-supps-'+dateStr,{});

    // Auto-add supplement nutrition if ticked
    const suppNutrition=[];
    if(daySupps.trunativ) suppNutrition.push({name:'TruNativ Protein (supplement)',kcal:55,p:13.5,c:1,f:0.5,k:80,ph:60,na:50});
    if(daySupps.fiber) suppNutrition.push({name:'Fiber / Maize Dextrin (supplement)',kcal:25,p:0,c:6,f:0,k:0,ph:0,na:0});

    const allFood=[...dayFood,...suppNutrition];
    const tk=allFood.reduce((s,f)=>s+(f.kcal||0),0);
    const tp=allFood.reduce((s,f)=>s+(f.p||0),0);
    const tc=allFood.reduce((s,f)=>s+(f.c||0),0);
    const tf=allFood.reduce((s,f)=>s+(f.f||0),0);
    const tka=allFood.reduce((s,f)=>s+(f.k||0),0);
    const tph=allFood.reduce((s,f)=>s+(f.ph||0),0);
    const tna=allFood.reduce((s,f)=>s+(f.na||0),0);
    const kcalOk=tk>=1200&&tk<=TARGET_KCAL;
    const kcalLow=tk<1200&&tk>0;
    const kcalOver=tk>TARGET_KCAL;
    const kcalColor=kcalLow?'var(--orange)':kcalOk?'var(--green)':kcalOver?'var(--red)':'var(--gold)';

    // Targets
    const TGT={p:90,k:2500,ph:1200,na:1700};

    html+=`<div class="c" style="background:var(--p2);border-color:var(--gold)">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div>
          <div style="font-size:30px;font-weight:700;color:${kcalColor}">${tk} kcal</div>
          <div style="font-size:11px;color:var(--muted)">Target ${TARGET_KCAL} kcal · ${kcalOk?(TARGET_KCAL-tk)+' remaining':(tk-TARGET_KCAL)+' over'}</div>
        </div>
        <div style="text-align:right;font-size:11px;color:var(--sub)">
          <div style="color:${tp>=TGT.p?'var(--green)':'var(--sub)'}">Protein ${tp.toFixed(1)}g / ${TGT.p}g</div>
          <div>Carbs ${tc.toFixed(1)}g</div>
          <div>Fat ${tf.toFixed(1)}g</div>
        </div>
      </div>
      <div class="kb"><div class="kf ${kcalOk?'kf-ok':'kf-ov'}" style="width:${Math.min(100,(tk/TARGET_KCAL)*100)}%"></div></div>

      <!-- Macro bars -->
      <div style="margin-top:12px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
        ${[
          {l:'Protein',v:tp,t:TGT.p,u:'g',c:'var(--green)'},
          {l:'Carbs',v:tc,t:Math.round(TARGET_KCAL*0.45/4),u:'g',c:'var(--gold)'},
          {l:'Fat',v:tf,t:Math.round(TARGET_KCAL*0.30/9),u:'g',c:'var(--orange)'},
        ].map(m=>`<div style="background:var(--p2);border-radius:8px;padding:8px">
          <div style="font-size:10px;color:var(--muted);margin-bottom:3px">${m.l}</div>
          <div style="font-size:14px;font-weight:700;color:${m.v>=m.t?m.c:'var(--text)'}">${m.v.toFixed(1)}g</div>
          <div style="font-size:9px;color:var(--muted)">/ ${m.t}g</div>
          <div style="height:4px;background:var(--b1);border-radius:2px;margin-top:4px;overflow:hidden">
            <div style="height:100%;width:${Math.min(100,m.v/m.t*100)}%;background:${m.c};border-radius:2px"></div>
          </div>
        </div>`).join('')}
      </div>

      <!-- Kidney mineral panel -->
      <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--b1)">
        
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">
          ${[
            {l:'Potassium',v:tka,t:TGT.k,u:'mg',warn:tka>TGT.k},
            {l:'Phosphorus',v:tph,t:TGT.ph,u:'mg',warn:tph>TGT.ph},
            {l:'Sodium',v:tna,t:TGT.na,u:'mg',warn:tna>TGT.na},
          ].map(m=>`<div style="background:${m.warn?'#1a0a0a':'var(--p2)'};border:1px solid ${m.warn?'var(--red)':'var(--b1)'};border-radius:8px;padding:7px">
            <div style="font-size:9px;color:${m.warn?'var(--red)':'var(--muted)'};margin-bottom:2px">${m.l}</div>
            <div style="font-size:13px;font-weight:700;color:${m.warn?'var(--red)':'var(--text)'}">${m.v}</div>
            <div style="font-size:9px;color:var(--muted)">/ ${m.t}mg</div>
            <div style="height:4px;background:var(--b1);border-radius:2px;margin-top:4px;overflow:hidden">
              <div style="height:100%;width:${Math.min(100,m.v/m.t*100)}%;background:${m.warn?'var(--red)':'var(--teal)'};border-radius:2px"></div>
            </div>
          </div>`).join('')}
        </div>
        
      </div>
    </div>`;
    if(isToday){
      // Food entry form
      html+=`<div class="c"><div class="ctitle">Add Food</div>
        <div style="margin-bottom:8px">
          <select id="food-meal" class="inp">
            <option value="breakfast">Breakfast</option>
            <option value="midMorn">Mid Morning</option>
            <option value="lunch" selected>Lunch</option>
            <option value="evening">Evening</option>
            <option value="dinner">Dinner</option>
          </select>
        </div>
        <div class="dd-wrap">
          <input id="food-inp" class="inp" type="text" placeholder="Search food..." oninput="searchFood(this.value)" autocomplete="off"/>
          <div id="food-dd" class="dd-menu"></div>
        </div>
        <div id="food-qty-wrap" style="display:none;margin-bottom:10px">
          <div style="display:flex;gap:8px;align-items:center">
            <input id="food-qty" class="inp" type="number" step="1" value="100" oninput="updateFoodPreview()" style="flex:1"/>
            <div id="food-qty-unit" style="color:var(--sub);font-size:12px">g</div>
            <div id="food-preview" style="font-size:14px;font-weight:700;color:var(--gold);min-width:70px;text-align:right"></div>
          </div>
        </div>
        <button class="btn btn-g" onclick="addFoodItem()">Add to Log</button>

        <!-- Custom food entry -->
        <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--b1)">
          <div style="font-size:11px;font-weight:700;color:var(--sub);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">Add Custom Food → Saves to My Library</div>
          <input id="cf-name" class="inp inp-sm" type="text" placeholder="Food name" style="margin-bottom:6px"/>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:6px">
            <input id="cf-qty" class="inp inp-sm" type="number" placeholder="Qty"/>
            <select id="cf-unit" class="inp inp-sm">
              <option value="g">g</option>
              <option value="ml">ml</option>
              <option value="pcs">pcs</option>
              <option value="tbsp">tbsp</option>
            </select>
            <input id="cf-kcal" class="inp inp-sm" type="number" placeholder="kcal/100g"/>
          </div>
          <div style="font-size:10px;color:var(--sub);margin-bottom:4px">Macros per 100g (optional)</div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:6px">
            <input id="cf-p" class="inp inp-sm" type="number" step="0.1" placeholder="Protein g"/>
            <input id="cf-c" class="inp inp-sm" type="number" step="0.1" placeholder="Carbs g"/>
            <input id="cf-f" class="inp inp-sm" type="number" step="0.1" placeholder="Fat g"/>
          </div>
          <div style="font-size:10px;color:var(--sub);margin-bottom:4px">Kidney minerals per 100g (optional)</div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px">
            <input id="cf-k" class="inp inp-sm" type="number" placeholder="K mg"/>
            <input id="cf-ph" class="inp inp-sm" type="number" placeholder="P mg"/>
            <input id="cf-na" class="inp inp-sm" type="number" placeholder="Na mg"/>
          </div>
          <button class="btn btn-dim" style="font-size:12px;width:100%" onclick="addCustomFood()">Add + Save to My Foods</button>
        </div>
      </div>`;
    }
    const byMeal={breakfast:[],midMorn:[],lunch:[],evening:[],dinner:[],other:[]};
    dayFood.forEach((f,i)=>{(byMeal[f.meal]||byMeal.other).push({...f,idx:i});});
    const mealNames={breakfast:'Breakfast',midMorn:'Mid Morning',lunch:'Lunch',evening:'Evening',dinner:'Dinner',other:'Other'};
    let logged='';
    Object.entries(byMeal).forEach(([key,items])=>{
      if(!items.length) return;
      const mKcal=items.reduce((s,f)=>s+f.kcal,0);
      logged+=`<div style="margin-bottom:10px"><div style="font-size:11px;font-weight:700;color:var(--gold);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">${mealNames[key]} · ${mKcal} kcal</div>
        ${items.map(f=>`<div class="food-logged">
          <div><div class="fl-name">${esc(f.name)}</div><div class="fl-meta">${f.qty}${f.unit||''} · ${f.time}${f.p?` · P:${f.p}g`:''}</div></div>
          <div style="display:flex;align-items:center;gap:10px">
            <div class="fl-kcal">${f.kcal}</div>
            ${isToday?`<div class="fl-del" onclick="delFood(${f.idx});renderTab('cal')">✕</div>`:''}
          </div>
        </div>`).join('')}
      </div>`;
    });
    // Show supplement nutrition if any
    if(suppNutrition.length>0){
      logged+=`<div style="margin-bottom:10px">
        <div style="font-size:11px;font-weight:700;color:var(--teal);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">💊 Supplements (auto)</div>
        ${suppNutrition.map(s=>`<div class="food-logged" style="opacity:0.8">
          <div><div class="fl-name">${s.name}</div><div class="fl-meta">Auto from supplement checklist · P:${s.p}g</div></div>
          <div class="fl-kcal">${s.kcal}</div>
        </div>`).join('')}
      </div>`;
    }
    if(logged) html+=`<div class="c"><div class="ctitle">Food Log</div>${logged}</div>`;
    // My Foods library
    if(USER_FOODS.length>0){
      html+=`<div class="c" style="border-color:var(--b2)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <div class="ctitle" style="margin-bottom:0">My Food Library (${USER_FOODS.length})</div>
          <button onclick="if(confirm('Clear your saved foods?')){USER_FOODS=[];saveS('dv4-user-foods',[]);renderTab('cal')}" style="background:none;border:none;color:var(--muted);font-size:11px;cursor:pointer">Clear</button>
        </div>
        <div style="font-size:11px;color:var(--muted)">Your custom foods appear first in search. Tap to delete.</div>
        ${USER_FOODS.slice(0,5).map((f,i)=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--b1);font-size:11px">
          <span style="color:var(--text)">${f.n}</span>
          <div style="display:flex;gap:8px;align-items:center">
            <span style="color:var(--muted)">${f.cal}kcal</span>
            <span onclick="USER_FOODS.splice(${i},1);saveS('dv4-user-foods',USER_FOODS);renderTab('cal')" style="color:var(--red);cursor:pointer">✕</span>
          </div>
        </div>`).join('')}
        ${USER_FOODS.length>5?`<div style="font-size:10px;color:var(--muted);margin-top:4px">+${USER_FOODS.length-5} more</div>`:''}
      </div>`;
    }
  }

  // ── NOTES TAB ──
  else if(CAL_DAY_TAB==='notes'){
    const weekKey=getWeekKey();
    const existing=JOURNAL.entries[weekKey];
    const isWed=new Date(dateStr).getDay()===3;
    html+=`<div class="c ${isWed?'c-gold':''}">
      <div class="ctitle">Weekly Journal</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:8px">
        ${isWed?'✦ Wednesday — Mercury day. Write one honest sentence.':'Week of '+getWeekLabel(weekKey)}
      </div>
      <textarea id="j-entry" class="inp" rows="5" placeholder="One honest sentence about this week. No sugarcoating." style="resize:none;line-height:1.6">${existing?existing.text:''}</textarea>
      <button class="btn btn-g" style="margin-top:8px" onclick="saveJournalEntry();renderTab('cal')">${existing?'Update':'Save This Week'}</button>
    </div>
    ${Object.entries(JOURNAL.entries).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,5).map(([key,entry])=>`
      <div style="padding:10px 0;border-bottom:1px solid var(--b1)">
        <div style="font-size:11px;font-weight:700;color:var(--gold)">${getWeekLabel(key)}</div>
        <div style="font-size:12px;color:var(--text);font-style:italic;margin-top:4px">"${esc(entry.text)}"</div>
      </div>`).join('')}`;
  }

  return html;
}

// ═══════════ REWARDS (renamed Iti) ═══════════
function rRewards(){
  // Pull latest from cloud silently in background
  if(ITI_SYNC_BIN&&ITI_SYNC_KEY){
    itiPull().then(pulled=>{if(pulled) renderTab('rewards');});
  }
  return rIti();
}

  GROQ_KEY=k;
  localStorage.setItem('dv4-groq-key',k);

}

async function sendChat(){
  if(!GROQ_KEY){renderChatContent();return;}
  const inp=document.getElementById('chat-input');
  const text=inp.value.trim();
  if(!text) return;
  inp.value='';
  addMsg('user',text);
  addTyping();
  document.getElementById('chat-send').disabled=true;

  try{
    const systemPrompt=buildContext();
    const history=CHAT_HISTORY.slice(-12);
    const apiMessages=[];
    for(let i=0;i<history.length-1;i++) apiMessages.push({role:history[i].role,content:history[i].content});
    apiMessages.push({role:'user',content:text});

    // Groq API call
    const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer '+GROQ_KEY
      },
      body:JSON.stringify({
        model:'llama-3.3-70b-versatile',
        max_tokens:800,
        temperature:0.8,
        messages:[
          {role:'system',content:systemPrompt},
          ...apiMessages
        ]
      })
    });

    if(!res.ok){
      const err=await res.json().catch(()=>({}));
      throw new Error(err.error?.message||'API error '+res.status);
    }

    const data=await res.json();
    removeTyping();
    const reply=data.choices&&data.choices[0]?.message?.content||'I am here, Divy. Try again.';
    addMsg('assistant',reply);
  }catch(e){
    removeTyping();
    const msg=e.message||'';
    if(msg.includes('401')||msg.includes('auth')||msg.includes('API key')){
      addMsg('assistant','Key looks wrong. Go to console.groq.com, sign up free, create an API key starting with gsk_ and paste it here.');
    } else if(msg.includes('Failed to fetch')||msg.includes('NetworkError')||msg.includes('CORS')){
      addMsg('assistant','The chat is blocked when opening from local storage. Open this file via Google Drive → three dots → Open with Chrome, or any https:// URL. Everything else in the app works fine offline.');
    } else {
      addMsg('assistant','Something went wrong: '+msg+'. Check your connection and try again.');
    }
  }
  document.getElementById('chat-send').disabled=false;
}

// ═══════════ PHOTOS ═══════════
function savePhoto(slot,input){
  const file=input.files[0];
  if(!file) return;
  // Compress to max 400px wide before storing
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      const max=400;
      const scale=Math.min(1,max/Math.max(img.width,img.height));
      canvas.width=Math.round(img.width*scale);
      canvas.height=Math.round(img.height*scale);
      canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
      PHOTOS[slot]=canvas.toDataURL('image/jpeg',0.75);
      saveS('dv4-photos',PHOTOS);
      flash('Photo saved 📸');
      renderTab('body');
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
