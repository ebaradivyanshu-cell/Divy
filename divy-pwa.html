function exportData(){
  const data={
    exported:new Date().toISOString(),
    version:'divy-pwa-v4',
    main:loadS('dv4-main',{}),
    body:loadS('dv4-body',{}),
    journal:loadS('dv4-journal',{}),
    vitals:loadS('dv4-vitals',{}),
    travel:loadS('dv4-travel',{}),
    weights:{},
    food:{},
    water:{},
    checks:{},
    supps:{},
  };
  // Collect dated data from last 180 days
  const start=new Date(START_DATE);
  const prep=new Date(PREP_START);
  for(let d=new Date(prep);d<=new Date();d.setDate(d.getDate()+1)){
    const ds=d.toISOString().split('T')[0];
    const ch=loadS('dv4-ch-'+ds,null);if(ch) data.checks[ds]=ch;
    const f=loadS('dv4-food-'+ds,null);if(f) data.food[ds]=f;
    const w=loadS('dv4-water-'+ds,null);if(w) data.water[ds]=w;
    const s=loadS('dv4-supps-'+ds,null);if(s) data.supps[ds]=s;
  }
  const json=JSON.stringify(data,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='divy-journey-backup-'+TODAY+'.json';
  a.click();URL.revokeObjectURL(url);
  flash('Data exported ✓');
}

function importData(){
  const input=document.createElement('input');
  input.type='file';input.accept='.json';
  input.onchange=e=>{
    const file=e.target.files[0];
    if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(data.version!=='divy-pwa-v4'){flash('Wrong file format');return;}
        if(data.main) saveS('dv4-main',data.main);
        if(data.body) saveS('dv4-body',data.body);
        if(data.journal) saveS('dv4-journal',data.journal);
        if(data.vitals) saveS('dv4-vitals',data.vitals);
        if(data.travel) saveS('dv4-travel',data.travel);
        Object.entries(data.checks||{}).forEach(([k,v])=>saveS('dv4-ch-'+k,v));
        Object.entries(data.food||{}).forEach(([k,v])=>saveS('dv4-food-'+k,v));
        Object.entries(data.water||{}).forEach(([k,v])=>saveS('dv4-water-'+k,v));
        Object.entries(data.supps||{}).forEach(([k,v])=>saveS('dv4-supps-'+k,v));
        flash('Data restored ✓ — reload the app');
        setTimeout(()=>location.reload(),1500);
      }catch(e){flash('Could not read file');}
    };
    reader.readAsText(file);
  };
  input.click();
}

// ═══════════ WEEKLY DASHBOARD ═══════════
function rWeeklyDashboard(){
  // Get last 7 days
  const days=[];
  for(let i=6;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');
    days.push(`${y}-${m}-${day}`);
  }
  const dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const comps=days.map(ds=>({ds,comp:getDayCompletion(ds),day:new Date(ds).getDay()}));
  const validDays=comps.filter(d=>d.ds>=PREP_START&&d.ds<=TODAY);
  if(validDays.length===0) return '';

  const avgPct=validDays.length?Math.round(validDays.reduce((s,d)=>s+d.comp.pct,0)/validDays.length):0;
  const greenDays=validDays.filter(d=>d.comp.pass).length;
  const avgCal=validDays.length?Math.round(validDays.reduce((s,d)=>s+d.comp.breakdown.cal.kcal,0)/validDays.length):0;
  const avgWater=validDays.length?Math.round(validDays.reduce((s,d)=>s+d.comp.breakdown.water.ml,0)/validDays.length):0;
  const medTotal=validDays.reduce((s,d)=>s+d.comp.breakdown.med.done,0);
  const medMax=validDays.length*6;
  const medPct=medMax?Math.round((medTotal/medMax)*100):0;

  // Bar chart for each day
  const bars=comps.map(({ds,comp,day})=>{
    const isActive=ds>=PREP_START&&ds<=TODAY;
    const isTdy=ds===TODAY;
    const barH=isActive?Math.max(4,Math.round(comp.pct*0.6)):0;
    const col=!isActive?'var(--dim)':comp.pass?'var(--green)':comp.pct>0?'var(--gold)':'var(--b2)';
    return `<div style="display:flex;flex-direction:column;align-items:center;gap:3px;flex:1">
      <div style="font-size:9px;font-weight:700;color:${isTdy?'var(--gold)':'var(--muted)'}">${comp.pct>0&&isActive?comp.pct+'%':''}</div>
      <div style="width:100%;height:60px;display:flex;align-items:flex-end;justify-content:center">
        <div style="width:80%;height:${barH}px;background:${col};border-radius:3px 3px 0 0;transition:height .3s;min-height:${isActive?'2px':'0'}"></div>
      </div>
      <div style="font-size:9px;color:${isTdy?'var(--gold)':'var(--sub)'};">${dayNames[day]}</div>
    </div>`;
  }).join('');

  // ── Timing scores — exclude today if before 9PM (partial day skews scores) ──
  const nowH=new Date().getHours();
  const includeTodayInScores=nowH>=21;
  const scoringDays=validDays.filter(d=>d.ds!==TODAY||(d.ds===TODAY&&includeTodayInScores));

  function timeToMin(t){
    if(!t) return null;
    const parts=t.replace(/\s*(AM|PM)/i,'').split(':');
    let h=parseInt(parts[0]),m=parseInt(parts[1]||0);
    if(t.toUpperCase().includes('PM')&&h!==12) h+=12;
    if(t.toUpperCase().includes('AM')&&h===12) h=0;
    return h*60+m;
  }

  function getMealTime(ds,meal){
    const food=ds===TODAY?FOOD_LOG:loadS('dv4-food-'+ds,[]);
    if(!Array.isArray(food)) return null;
    const entry=food.find(f=>f.meal===meal);
    return entry?entry.time:null;
  }

  function getExTime(ds,id){
    const ex=ds===TODAY?EX_LOG:loadS('dv4-ex-'+ds,{});
    return ex[id]&&ex[id].done&&ex[id].time?ex[id].time:null;
  }

  // ── CONSISTENCY — did you DO it every day? (completion rate per activity) ──
  // For each tracked activity: what % of days was it done?
  const N=scoringDays.length||1;

  const activityConsistency=[
    // Wake logged
    {l:'Wake',done:scoringDays.filter(d=>VITALS[d.ds]&&VITALS[d.ds].wake).length},
    // Sleep logged
    {l:'Sleep',done:scoringDays.filter(d=>VITALS[d.ds]&&VITALS[d.ds].sleep).length},
    // Morning walk done
    {l:'Walk',done:scoringDays.filter(d=>{const ex=d.ds===TODAY?EX_LOG:loadS('dv4-ex-'+d.ds,{});return ex['walk_lake']&&ex['walk_lake'].done;}).length},
    // Breathwork done
    {l:'Breathwork',done:scoringDays.filter(d=>{const ex=d.ds===TODAY?EX_LOG:loadS('dv4-ex-'+d.ds,{});return ex['breathwork']&&ex['breathwork'].done;}).length},
    // Surya Arghya done (any 'd' check in schedule matching arghya item index)
    {l:'Arghya',done:scoringDays.filter(d=>{
      const ch=d.ds===TODAY?CHECKS:loadS('dv4-ch-'+d.ds,{});
      const sch=SCH_HOME;
      const idx=sch.findIndex(s=>s.ic==='☀️');
      return idx>=0&&isDone(ch['d'+idx]);
    }).length},
    // Breakfast logged
    {l:'Breakfast',done:scoringDays.filter(d=>getMealTime(d.ds,'breakfast')).length},
    // Lunch logged
    {l:'Lunch',done:scoringDays.filter(d=>getMealTime(d.ds,'lunch')).length},
    // Evening walk done
    {l:'Eve Walk',done:scoringDays.filter(d=>{const ex=d.ds===TODAY?EX_LOG:loadS('dv4-ex-'+d.ds,{});return ex['eve_walk']&&ex['eve_walk'].done;}).length},
  ].map(a=>({...a,pct:N>0?Math.round(a.done/N*100):0}));

  const overallConsistency=scoringDays.length>=2
    ?Math.round(activityConsistency.reduce((s,a)=>s+a.pct,0)/activityConsistency.length)
    :null;

  // ── DISCIPLINE — on days you did it, how close to target time? ──
  const TARGETS={
    wake:5*60,         // 5:00 AM
    walk:6*60,         // 6:00 AM
    breathwork:5*60+20,// 5:20 AM
    arghya:7*60+15,    // 7:15 AM
    breakfast:7*60+30, // 7:30 AM
    lunch:13*60,       // 1:00 PM
    dinner:19*60,      // 7:00 PM
    sleep:21*60+30,    // 9:30 PM
    eveWalk:18*60+30,  // 6:30 PM
  };

  function disciplineScore(times,targetMin){
    const valid=times.filter(t=>t!==null);
    if(!valid.length) return null;
    const avgGap=valid.reduce((s,v)=>s+Math.abs(v-targetMin),0)/valid.length;
    return Math.max(0,Math.round(100-avgGap*(100/60)));
  }

  const wakeTimes=scoringDays.map(d=>{const v=VITALS[d.ds];return v&&v.wake?timeToMin(v.wake):null;});
  const sleepTimes=scoringDays.map(d=>{const v=VITALS[d.ds];return v&&v.sleep?timeToMin(v.sleep):null;});
  const walkTimes=scoringDays.map(d=>timeToMin(getExTime(d.ds,'walk_lake')));
  const breathTimes=scoringDays.map(d=>timeToMin(getExTime(d.ds,'breathwork')));
  const eveWalkTimes=scoringDays.map(d=>timeToMin(getExTime(d.ds,'eve_walk')));
  const bfTimes=scoringDays.map(d=>timeToMin(getMealTime(d.ds,'breakfast')));
  const lunchTimes=scoringDays.map(d=>timeToMin(getMealTime(d.ds,'lunch')));
  const dinnerTimes=scoringDays.map(d=>timeToMin(getMealTime(d.ds,'dinner')));

  const disciplineItems=[
    {l:'Wake',score:disciplineScore(wakeTimes,TARGETS.wake),target:'5:00 AM'},
    {l:'Walk',score:disciplineScore(walkTimes,TARGETS.walk),target:'6:00 AM'},
    {l:'Breathwork',score:disciplineScore(breathTimes,TARGETS.breathwork),target:'5:20 AM'},
    {l:'Breakfast',score:disciplineScore(bfTimes,TARGETS.breakfast),target:'7:30 AM'},
    {l:'Lunch',score:disciplineScore(lunchTimes,TARGETS.lunch),target:'1:00 PM'},
    {l:'Dinner',score:disciplineScore(dinnerTimes,TARGETS.dinner),target:'7:00 PM'},
    {l:'Sleep',score:disciplineScore(sleepTimes,TARGETS.sleep),target:'9:30 PM'},
    {l:'Eve Walk',score:disciplineScore(eveWalkTimes,TARGETS.eveWalk),target:'6:30 PM'},
  ].filter(d=>d.score!==null);

  const overallDiscipline=disciplineItems.length>=2
    ?Math.round(disciplineItems.reduce((s,d)=>s+d.score,0)/disciplineItems.length)
    :null;

  const gap=overallConsistency!==null&&overallDiscipline!==null?Math.abs(overallConsistency-overallDiscipline):null;
  const gapMsg=(scoringDays.length<3)?'Log at least 3 days to see scores':gap<=10?'Excellent — doing it daily and on time':gap<=20?'Good — slight gap between regularity and timing':gap<=35?'Either skipping days or timing has drifted':'Check which activities are being skipped or delayed';
  const gapColor=(scoringDays.length<3)?'var(--muted)':gap<=10?'var(--green)':gap<=20?'var(--teal)':gap<=35?'var(--orange)':'var(--red)';

  // Average wake display
  const avgWakeMin2=wakeTimes.filter(v=>v!==null);
  const avgWakeDisplay=avgWakeMin2.length?`${String(Math.floor(avgWakeMin2.reduce((s,v)=>s+v,0)/avgWakeMin2.length/60)).padStart(2,'0')}:${String(Math.round(avgWakeMin2.reduce((s,v)=>s+v,0)/avgWakeMin2.length%60)).padStart(2,'0')} AM`:null;

  // Exercise detail per day
  const exDetails=validDays.map(({ds,day})=>{
    if(ds>TODAY) return null;
    const dayEx=ds===TODAY?EX_LOG:loadS('dv4-ex-'+ds,{});
    const EX_IDS=['breathwork','walk_lake','rope','band_chest','band_row','band_clam','band_curl','band_walk','band_press','eve_walk'];
    const EX_LABELS={breathwork:'Brth',walk_lake:'Walk',rope:'Rope',band_chest:'Chest',band_row:'Row',band_clam:'Clam',band_curl:'Curl',band_walk:'BandW',band_press:'Press',eve_walk:'Eve'};
    const items=EX_IDS.map(id=>{
      const e=dayEx[id];
      const done=e&&e.done;
      let label='';
      if(id==='rope'&&done&&e.reps){
        const col=e.level==='good'?'#2a8a2a':e.level==='improve'?'#c87020':'#c03030';
        label=`<span style="color:${col};font-weight:700">${e.reps}r</span>`;
      } else if(done){
        label=`<span style="color:var(--green)">✓</span>`;
      } else {
        label=`<span style="color:var(--b2)">✗</span>`;

      return `<div style="text-align:center;flex:1">
        <div style="font-size:9px;color:var(--muted)">${EX_LABELS[id].substring(0,4)}</div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div class="ctitle" style="margin-bottom:0">This Week</div>

    </div>
    <div style="display:flex;gap:4px;align-items:flex-end;margin-bottom:12px">${bars}</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px">
      ${[
        {l:'Avg Score',v:avgPct+'%',c:avgPct>=80?'var(--green)':'var(--gold)'},
        {l:'Avg Calories',v:avgCal+'kcal',c:avgCal>=1200&&avgCal<=1600?'var(--green)':'var(--orange)'},
        {l:'Avg Water',v:avgWater>=1000?(avgWater/1000).toFixed(1)+'L':avgWater+'ml',c:avgWater>=2500?'var(--teal)':'var(--muted)'},
        {l:'Med Adherence',v:medPct+'%',c:medPct>=90?'var(--green)':medPct>=70?'var(--orange)':'var(--red)'},

        <div style="font-size:14px;font-weight:700;color:${s.c}">${s.v}</div>
        <div style="font-size:9px;color:var(--muted);margin-top:2px">${s.l}</div>
      </div>`).join('')}
    </div>
    ${avgWakeDisplay?`<div style="background:var(--p2);border-radius:8px;padding:8px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:11px;color:var(--sub)">Avg wake time</div>

    ${overallConsistency!==null||overallDiscipline!==null?`
    <div style="background:var(--p2);border-radius:10px;padding:12px;margin-bottom:10px">
      <div style="font-size:11px;font-weight:700;color:var(--gold);margin-bottom:10px">Consistency &amp; Discipline</div>

        <div style="flex:1;text-align:center;background:var(--p1);border-radius:8px;padding:10px">
          <div style="font-size:22px;font-weight:700;color:var(--teal)">${overallConsistency!==null?overallConsistency+'%':'—'}</div>
          <div style="font-size:10px;color:var(--sub);margin-top:2px">Consistency</div>
          <div style="font-size:9px;color:var(--muted);margin-top:2px">doing it daily</div>
        </div>
        <div style="flex:1;text-align:center;background:var(--p1);border-radius:8px;padding:10px">
          <div style="font-size:22px;font-weight:700;color:var(--orange)">${overallDiscipline!==null?overallDiscipline+'%':'—'}</div>
          <div style="font-size:10px;color:var(--sub);margin-top:2px">Discipline</div>

    <details style="cursor:pointer;margin-bottom:10px">

          </div>`).join('')}
        <div style="font-size:9px;color:var(--muted);margin-top:4px;padding:0 4px">% of days the activity was completed</div>
      </div>
    </details>

    <details style="cursor:pointer;margin-bottom:10px">
      <summary style="font-size:11px;font-weight:700;color:var(--sub);padding:6px 0;list-style:none;display:flex;justify-content:space-between">
        <span>Discipline Detail</span><span style="font-size:10px;color:var(--muted)">▾</span>
      </summary>
      <div style="margin-top:8px;display:grid;gap:4px">
        ${disciplineItems.map(d=>`
          <div style="display:flex;justify-content:space-between;align-items:center;padding:5px 8px;background:var(--p2);border-radius:8px">
            <div>
              <div style="font-size:11px;color:var(--text)">${d.l}</div>
              <div style="font-size:9px;color:var(--muted)">target ${d.target}</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <div style="width:80px;height:5px;background:var(--b1);border-radius:3px;overflow:hidden">
                <div style="height:100%;width:${d.score}%;background:${d.score>=80?'var(--green)':d.score>=50?'var(--gold)':'var(--red)'};border-radius:3px"></div>
              </div>
              <div style="font-size:11px;font-weight:700;color:${d.score>=80?'var(--green)':d.score>=50?'var(--gold)':'var(--red)'};width:32px;text-align:right">${d.score}%</div>
            </div>
          </div>`).join('')}
        <div style="font-size:9px;color:var(--muted);margin-top:4px;padding:0 4px">% closeness to target time on days activity was done</div>

    <!-- Exercise detail — collapsed by default -->
    <details style="cursor:pointer">
      <summary style="font-size:12px;font-weight:700;color:var(--gold);padding:8px 0;list-style:none;display:flex;justify-content:space-between;align-items:center">
        <span>Exercise This Week</span>
        <span style="font-size:10px;color:var(--muted)">tap to expand ▾</span>
      </summary>
      <div style="margin-top:8px;border-top:1px solid var(--b1);padding-top:8px">

          ${['Brth','Walk','Rope','Band','Eve'].map(l=>`<div style="flex:1;font-size:9px;color:var(--muted);text-align:center">${l}</div>`).join('')}
          <div style="font-size:9px;color:var(--muted);text-align:right;width:30px">Pts</div>
        </div>
        ${exDetails.map(({ds,day,items})=>{
          const dayEx=ds===TODAY?EX_LOG:loadS('dv4-ex-'+ds,{});
          const pts=Object.entries(dayEx).filter(([,v])=>v&&v.done).reduce((s,[k])=>{
            for(const ph of EX) for(const ex of ph.list) if(ex.id===k) return s+ex.pts;
            return s;
          },0);
          const isTdy=ds===TODAY;
          return `<div style="display:flex;gap:4px;align-items:center;padding:5px 4px;border-radius:6px;background:${isTdy?'var(--p3)':'transparent'};margin-bottom:2px">
            <div style="font-size:10px;font-weight:700;color:${isTdy?'var(--gold)':'var(--sub)'};width:28px">${['Su','Mo','Tu','We','Th','Fr','Sa'][day]}</div>
            ${items}
            <div style="font-size:10px;font-weight:700;color:var(--gold);text-align:right;width:30px">${pts>0?pts+'p':'-'}</div>
          </div>`;
        }).join('')}
        <div style="font-size:9px;color:var(--muted);margin-top:6px">Rope: green=40+ reps · yellow=20-39 · red=under 20</div>
      </div>
    </details>

    <!-- BP 3-Week History -->
    ${(()=>{
      // Build last 21 days
      const bp21=[];
      for(let i=20;i>=0;i--){
        const d=new Date();d.setDate(d.getDate()-i);
        const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');
        const ds=`${y}-${m}-${dd}`;
        if(ds<PREP_START||ds>TODAY) continue;
        const bp=loadS('dv4-bp-'+ds,{});
        bp21.push({ds,day:d.getDay(),date:d.getDate(),month:d.getMonth(),morning:bp.morning,evening:bp.evening});
      }
      const hasAny=bp21.some(d=>d.morning||d.evening);
      if(!hasAny) return '<div style="font-size:11px;color:var(--muted);padding:8px 0;text-align:center">No BP readings logged yet</div>';

      const dayNames=['Su','Mo','Tu','We','Th','Fr','Sa'];
      const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const bpColor=(sys,dia)=>!sys?'var(--muted)':sys>140||dia>90?'var(--red)':sys>130||dia>85?'var(--orange)':'var(--green)';

      const allR=bp21.flatMap(d=>[d.morning,d.evening].filter(Boolean));
      const avgSys=allR.length?Math.round(allR.reduce((s,v)=>s+v.sys,0)/allR.length):null;
      const avgDia=allR.length?Math.round(allR.reduce((s,v)=>s+v.dia,0)/allR.length):null;

      return `<details style="cursor:pointer;margin-top:6px">

        </summary>
        <div style="margin-top:8px;border-top:1px solid var(--b1);padding-top:8px">
          <div style="display:grid;grid-template-columns:52px 1fr 1fr;gap:3px;margin-bottom:6px;padding:0 2px">
            <div style="font-size:9px;color:var(--muted)">Date</div>
            <div style="font-size:9px;color:var(--muted);text-align:center">Morning</div>
            <div style="font-size:9px;color:var(--muted);text-align:center">Evening</div>
          </div>
          <div style="max-height:300px;overflow-y:auto;-webkit-overflow-scrolling:touch">
            ${bp21.slice().reverse().map(({ds,day,date,month,morning:m,evening:e})=>{
              const isTdy=ds===TODAY;
              const hasBP=m||e;
              if(!hasBP&&!isTdy) return '';
              return `<div style="display:grid;grid-template-columns:52px 1fr 1fr;gap:3px;align-items:center;padding:5px 2px;border-bottom:1px solid var(--b1);background:${isTdy?'var(--p2)':'transparent'}">
                <div>
                  <div style="font-size:10px;font-weight:700;color:${isTdy?'var(--gold)':'var(--sub)'}">${dayNames[day]} ${date} ${months[month]}</div>
                </div>
                <div style="text-align:center;font-size:12px;font-weight:700;color:${bpColor(m?.sys,m?.dia)}">${m?m.sys+'/'+m.dia:'—'}</div>
                <div style="text-align:center;font-size:12px;font-weight:700;color:${bpColor(e?.sys,e?.dia)}">${e?e.sys+'/'+e.dia:'—'}</div>
              </div>`;
            }).join('')}
          </div>
          ${avgSys?`<div style="margin-top:10px;padding:8px;background:var(--p2);border-radius:8px;display:flex;justify-content:space-between;align-items:center">
            <div><div style="font-size:10px;color:var(--sub)">21-day average</div><div style="font-size:9px;color:var(--muted)">${allR.length} readings</div></div>
            <div style="font-size:16px;font-weight:700;color:${bpColor(avgSys,avgDia)}">${avgSys}/${avgDia} mmHg</div>
          </div>`:''}
          <div style="font-size:9px;color:var(--muted);margin-top:6px">🟢 &lt;130/85 · 🟡 130-140 · 🔴 &gt;140/90</div>
        </div>
      </details>`;
    })()}
  </div>`;
}

// ═══════════ MONTHLY DASHBOARD ═══════════
function rMonthlyDashboard(year,month){
  const daysInMonth=new Date(year,month+1,0).getDate();
  const days=[];
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if(ds>TODAY) break;
    if(ds>=PREP_START) days.push(ds);
  }
  if(days.length===0) return '';

  const comps=days.map(ds=>({ds,comp:getDayCompletion(ds)}));
  const greenDays=comps.filter(d=>d.comp.pass).length;
  const missedDays=comps.filter(d=>!d.comp.pass&&d.comp.total>0).length;
  const avgPct=comps.length?Math.round(comps.reduce((s,d)=>s+d.comp.pct,0)/comps.length):0;
  const avgCal=comps.length?Math.round(comps.reduce((s,d)=>s+d.comp.breakdown.cal.kcal,0)/comps.length):0;
  const totalMedDone=comps.reduce((s,d)=>s+d.comp.breakdown.med.done,0);
  const totalMedPossible=comps.length*6;
  const medPct=totalMedPossible?Math.round((totalMedDone/totalMedPossible)*100):0;
  const avgWater=comps.length?Math.round(comps.reduce((s,d)=>s+d.comp.breakdown.water.ml,0)/comps.length):0;

  // Day of week breakdown
  const byDow={0:[],1:[],2:[],3:[],4:[],5:[],6:[]};
  comps.forEach(({ds,comp})=>{byDow[new Date(ds).getDay()].push(comp.pct);});
  const dowNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const dowAvgs=Object.entries(byDow).map(([dow,pcts])=>({
    dow:parseInt(dow),
    avg:pcts.length?Math.round(pcts.reduce((s,p)=>s+p,0)/pcts.length):null
  })).filter(d=>d.avg!==null);
  const bestDow=dowAvgs.length?dowAvgs.reduce((a,b)=>b.avg>a.avg?b:a):null;
  const worstDow=dowAvgs.length?dowAvgs.reduce((a,b)=>b.avg<a.avg?b:a):null;

  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  return `<div class="c">
    <div class="ctitle">${months[month]} ${year} — Monthly Summary</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px">
      ${[
        {l:'Green Days',v:greenDays+'/'+comps.length,c:'var(--green)'},
        {l:'Missed Days',v:missedDays,c:missedDays>0?'var(--red)':'var(--green)'},
        {l:'Avg Score',v:avgPct+'%',c:avgPct>=80?'var(--green)':'var(--gold)'},
        {l:'Avg Calories',v:avgCal+'kcal',c:avgCal>=1200&&avgCal<=1600?'var(--green)':'var(--orange)'},
        {l:'Avg Water',v:avgWater>=1000?(avgWater/1000).toFixed(1)+'L':avgWater+'ml',c:avgWater>=2500?'var(--teal)':'var(--muted)'},
        {l:'Med Adherence',v:medPct+'%',c:medPct>=90?'var(--green)':medPct>=70?'var(--orange)':'var(--red)'},
      ].map(s=>`<div style="background:var(--p2);border-radius:8px;padding:8px;text-align:center">
        <div style="font-size:15px;font-weight:700;color:${s.c}">${s.v}</div>
        <div style="font-size:9px;color:var(--muted);margin-top:1px">${s.l}</div>
      </div>`).join('')}
    </div>
    ${bestDow&&bestDow.dow!==worstDow.dow?`
    <div style="display:flex;gap:8px">
      <div style="flex:1;background:var(--p2);border-radius:8px;padding:8px;text-align:center">
        <div style="font-size:10px;color:var(--green);font-weight:700">Best Day</div>
        <div style="font-size:16px;font-weight:700;color:var(--gold)">${dowNames[bestDow.dow]}</div>
        <div style="font-size:10px;color:var(--muted)">avg ${bestDow.avg}%</div>
      </div>
      <div style="flex:1;background:var(--p2);border-radius:8px;padding:8px;text-align:center">
        <div style="font-size:10px;color:var(--red);font-weight:700">Needs Work</div>
        <div style="font-size:16px;font-weight:700;color:var(--gold)">${dowNames[worstDow.dow]}</div>
        <div style="font-size:10px;color:var(--muted)">avg ${worstDow.avg}%</div>
      </div>
    </div>`:''}
  </div>`;
}

// ═══════════ SOS / EXTRA MEDICINES ═══════════
let EXTRA_MEDS=loadS('dv4-extra-meds',{});

function saveExtraMeds(dateStr){
  const key='dv4-extra-meds-'+dateStr;
  const list=EXTRA_MEDS[dateStr]||[];
  saveS(key,list);
}

function loadExtraMeds(dateStr){
  return loadS('dv4-extra-meds-'+dateStr,[]);
}

function addExtraMed(dateStr){
  const name=document.getElementById('em-name').value.trim();
  const dose=document.getElementById('em-dose').value.trim();
  const time=document.getElementById('em-time').value||new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  const reason=document.getElementById('em-reason').value.trim();
  if(!name){flash('Enter medicine name');return;}
  const list=loadExtraMeds(dateStr);
  list.push({name,dose,time,reason,id:Date.now()});
  saveS('dv4-extra-meds-'+dateStr,list);
  flash('Extra medicine logged ✓');
  _compCache={};
  renderTab('cal');
}

function delExtraMed(dateStr,id){
  const list=loadExtraMeds(dateStr).filter(m=>m.id!==id);
  saveS('dv4-extra-meds-'+dateStr,list);
  renderTab('cal');
}


function logBP(dateStr,slot,sysId,diaId){
  const sys=parseInt(document.getElementById(sysId).value)||0;
  const dia=parseInt(document.getElementById(diaId).value)||0;
  if(!sys||!dia){flash('Enter both systolic and diastolic');return;}
  const time=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  const bp=loadS('dv4-bp-'+dateStr,{});
  bp[slot]={sys,dia,time};
  saveS('dv4-bp-'+dateStr,bp);
  flash(slot==='morning'?'Morning BP logged ✓':'Evening BP logged ✓');
  renderTab('cal');
}
// ═══════════ INIT ═══════════
updateHeader();
renderTab('home');
schedNotifs();

// Check day lock after slight delay
setTimeout(()=>{
  const lockNeeded=checkDayLock();
  if(lockNeeded){
    const modal=document.getElementById('lock-modal');
    if(modal) modal.style.display='flex';
  }
},1200);

// Close dropdowns on outside tap
document.addEventListener('click',function(e){
  if(!e.target.closest('.dd-wrap')){
    document.querySelectorAll('.dd-menu').forEach(m=>m.classList.remove('open'));
  }
});
</script>
</body>
