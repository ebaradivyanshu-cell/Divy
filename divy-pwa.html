<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#0a0a0f"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Divy"/>
<title>Divy's Journey</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
input,textarea{-webkit-user-select:text;user-select:text}
:root{
  --bg:#0a0a0f;--p1:#12100a;--p2:#1a1610;--p3:#221e12;
  --b1:#2a2010;--b2:#3a2e1a;--b3:#4a3e2a;
  --gold:#d4a843;--gold2:#b8891e;--gold3:#f0c060;
  --green:#5aac7a;--green2:#3a8c5a;
  --red:#e06060;--blue:#60a0e0;--orange:#e08840;--teal:#50b0a0;
  --text:#e8e0d0;--sub:#8a7a5a;--muted:#6a6050;--dim:#4a4030;
  --ff:'DM Sans',sans-serif;--fs:'Cormorant Garamond',serif;
  --r:12px;--r2:8px;--r3:20px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--ff)}
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;position:relative}

/* HEADER */
#hdr{background:linear-gradient(160deg,#1e1a0a 0%,#0f0d08 100%);border-bottom:1px solid var(--b1);padding:12px 16px 10px;flex-shrink:0;z-index:20}
.hdr-row{display:flex;justify-content:space-between;align-items:center}
.hdr-title{font-family:var(--fs);font-size:22px;font-weight:700;color:var(--gold);letter-spacing:.3px}
.hdr-family{font-size:10px;color:var(--sub);margin-top:1px;letter-spacing:1px}
.hdr-wt{font-size:24px;font-weight:700;color:var(--gold);text-align:right;line-height:1}
.hdr-goal{font-size:10px;color:var(--muted);text-align:right;margin-top:2px}
.mode-row{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.mode-tog{display:flex;background:#150f05;border-radius:8px;padding:3px;gap:3px}
.mode-tog button{padding:5px 13px;font-size:11px;font-weight:600;border:none;border-radius:5px;font-family:var(--ff);transition:all .2s;cursor:pointer;color:var(--muted);background:transparent}
.mode-tog .mhome{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0a0a0f}
.mode-tog .mintl{background:linear-gradient(135deg,#1a2a4a,#0a1a2a);color:var(--blue)}
.hdr-date{font-size:11px;color:var(--sub);font-weight:600}
.prog-wrap{margin-top:8px}
.prog-row{display:flex;justify-content:space-between;margin-bottom:3px;font-size:10px;color:var(--muted)}
.prog-pct{color:var(--green);font-weight:700;font-size:11px}
.prog-bar{height:5px;background:var(--b1);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--green));border-radius:3px;transition:width .8s cubic-bezier(.4,0,.2,1)}

/* TABS */
#tabs{display:flex;background:#0d0b07;border-bottom:1px solid var(--b1);overflow-x:auto;flex-shrink:0;scrollbar-width:none}
#tabs::-webkit-scrollbar{display:none}
.tb{padding:10px 12px;font-size:11px;font-weight:600;color:var(--muted);border:none;background:none;border-bottom:2px solid transparent;white-space:nowrap;cursor:pointer;font-family:var(--ff);transition:all .2s;flex-shrink:0}
.tb.on{color:var(--gold);border-bottom-color:var(--gold)}

/* BODY */
#body{flex:1;overflow-y:auto;padding:14px;padding-bottom:30px;scrollbar-width:none}
#body::-webkit-scrollbar{display:none}

/* CARDS */
.c{background:var(--p1);border:1px solid var(--b1);border-radius:var(--r);padding:14px;margin-bottom:10px}
.c-gold{border-color:var(--gold);background:#0d0b06}
.c-green{border-color:var(--green2);background:#0a140e}
.c-blue{border-color:#2a4a6a;background:#080d12}
.ctitle{font-size:11px;font-weight:700;color:var(--gold);margin-bottom:10px;text-transform:uppercase;letter-spacing:1.5px}

/* STAT GRID */
.sg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.sb{background:var(--p1);border:1px solid var(--b1);border-radius:10px;padding:11px 8px;text-align:center}
.sv{font-size:20px;font-weight:700}
.sl{font-size:10px;color:var(--muted);margin-top:2px}

/* BUTTONS */
.btn{border:none;border-radius:var(--r2);padding:11px 16px;font-size:13px;font-weight:600;cursor:pointer;width:100%;margin-top:8px;font-family:var(--ff);transition:all .2s}
.btn:active{transform:scale(.97)}
.btn-g{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0a0a0f}
.btn-pk{background:linear-gradient(135deg,#8b3a52,#6b2a3a);color:#fff}
.btn-dim{background:var(--b1);color:var(--text)}
.btn-sm{width:auto;padding:7px 13px;font-size:12px;margin-top:0}
.btn-teal{background:linear-gradient(135deg,#2a6a60,#1a4a42);color:#a0e0d8}

/* INPUTS */
.inp{background:var(--p2);border:1px solid var(--b2);border-radius:var(--r2);padding:10px 12px;color:var(--text);font-size:13px;width:100%;outline:none;font-family:var(--ff);transition:border-color .2s}
.inp:focus{border-color:var(--gold)}
.inp-sm{padding:8px 10px;font-size:12px}

/* CYCLE DOTS */
.cd-row{display:flex;gap:5px;margin-bottom:10px}
.cd{flex:1;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:1px solid var(--b1);transition:all .3s}
.cd-d{background:#1a4a2a;border-color:var(--green2);color:var(--green)}
.cd-n{background:var(--gold);border-color:var(--gold);color:#0a0a0f}
.cd-f{background:var(--p2);color:var(--dim)}

/* SCHED */
.si{display:flex;align-items:flex-start;gap:11px;padding:11px 12px;border-radius:10px;margin-bottom:7px;cursor:pointer;border:1px solid var(--b1);background:var(--p1);transition:all .2s}
.si.dn{background:#09160d;border-color:var(--green2)}
.si-ic{font-size:20px;margin-top:1px;flex-shrink:0}
.si-inf{flex:1}
.si-t{font-size:10px;margin-bottom:1px;font-weight:600}
.si-a{font-size:13px;color:var(--text)}
.si.dn .si-a{color:#7ac49a}
.chk{width:26px;height:26px;border-radius:50%;border:2px solid var(--b2);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--green);flex-shrink:0;margin-top:2px;transition:all .2s}
.si.dn .chk{background:#1a4a2a;border-color:var(--green)}

/* EXERCISE */
.ei{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:10px;margin-bottom:7px;cursor:pointer;border:1px solid var(--b1);background:var(--p1);transition:all .2s}
.ei.dn{background:#09160d;border-color:var(--green2)}
.ei.lk{opacity:.4;cursor:default}
.ei-ic{font-size:22px;flex-shrink:0}
.ei-inf{flex:1}
.ei-n{font-size:13px;font-weight:600}
.ei.dn .ei-n{color:var(--green)}
.ei-d{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.4}
.ei-dur{font-size:10px;color:var(--sub);margin-top:3px}
.ei-pts{font-size:12px;font-weight:700;color:var(--gold);flex-shrink:0;margin-right:4px}

/* BAND GUIDE */
.bg-ex{background:var(--p2);border-radius:8px;padding:10px 12px;margin-bottom:7px;border-left:3px solid var(--teal)}
.bg-name{font-size:12px;font-weight:700;color:var(--teal);margin-bottom:3px}
.bg-step{font-size:11px;color:var(--sub);line-height:1.6}

/* FOOD */
.food-search{position:relative;margin-bottom:10px}
.food-results{position:absolute;top:100%;left:0;right:0;background:var(--p2);border:1px solid var(--b2);border-radius:var(--r2);z-index:50;max-height:200px;overflow-y:auto;display:none}
.food-results.show{display:block}
.fr-item{padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--b1);transition:background .15s}
.fr-item:hover{background:var(--b1)}
.fr-name{font-size:13px}
.fr-cal{font-size:11px;color:var(--gold)}
.food-logged{background:var(--p2);border-radius:var(--r2);padding:10px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.fl-name{font-size:13px}
.fl-meta{font-size:11px;color:var(--muted);margin-top:2px}
.fl-kcal{font-size:14px;font-weight:700;color:var(--gold)}
.fl-del{font-size:16px;cursor:pointer;color:var(--muted);padding:4px}

/* WATER */
.water-wrap{display:flex;flex-direction:column;align-items:center;padding:10px 0}
.water-bottle{position:relative;width:100px;height:180px;margin:0 auto 16px}
.wb-outer{width:100%;height:100%;border:2.5px solid var(--teal);border-radius:20px 20px 14px 14px;overflow:hidden;position:relative;background:rgba(10,20,20,.8)}
.wb-fill{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(0deg,rgba(30,160,140,.9),rgba(80,200,180,.6));transition:height .5s cubic-bezier(.4,0,.2,1);border-radius:0 0 11px 11px}
.wb-lines{position:absolute;inset:0;display:flex;flex-direction:column-reverse;justify-content:space-around;padding:8px 0;pointer-events:none}
.wb-line{height:1px;background:rgba(80,200,180,.15);margin:0 8px}
.wb-label{position:absolute;right:-44px;font-size:10px;color:var(--teal);font-weight:600;font-family:var(--ff)}
.water-info{text-align:center;margin-bottom:12px}
.water-ml{font-size:28px;font-weight:700;color:var(--teal)}
.water-target{font-size:12px;color:var(--sub);margin-top:2px}
.water-btns{display:flex;gap:10px;width:100%;justify-content:center}
.water-add{background:linear-gradient(135deg,#1a5a50,#0a3a32);border:1px solid var(--teal);color:var(--teal);border-radius:10px;padding:12px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--ff);transition:all .2s}
.water-add:active{transform:scale(.95)}
.water-reset{background:var(--b1);border:none;color:var(--muted);border-radius:10px;padding:12px 16px;font-size:12px;cursor:pointer;font-family:var(--ff)}
.water-drops{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:12px}
.wd{width:24px;height:24px;border-radius:50% 50% 40% 60%/50% 50% 60% 40%;border:1.5px solid var(--teal);transition:all .3s}
.wd.full{background:var(--teal)}

/* CALENDAR */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:10px}
.cal-day-hdr{font-size:10px;color:var(--muted);text-align:center;padding:4px 0;font-weight:700}
.cal-day{height:36px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;cursor:pointer;position:relative;transition:all .2s;border:1px solid transparent}
.cal-day.empty{background:transparent;cursor:default}
.cal-day.future{background:var(--p2);color:var(--dim)}
.cal-day.today{background:var(--gold);color:#0a0a0f;font-weight:700}
.cal-day.done{background:#1a4a2a;border-color:var(--green2);color:var(--green)}
.cal-day.skipped{background:#2a0a0a;border-color:#5a2020;color:var(--red)}
.cal-day.start{background:var(--p3);border-color:var(--gold);color:var(--gold)}
.cal-day.prep{background:#0a1a2a;border-color:#4a90d0;color:#60b0e0}
.cal-day.prep-done{background:#0a2a1a;border-color:#3a8a5a;color:#50a070}
.cal-dot{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--gold)}

/* MILESTONES */
.ms{background:var(--p1);border:1px solid var(--b1);border-radius:var(--r);padding:14px;margin-bottom:9px;transition:all .3s}
.ms.ms-d{background:#09160d;border-color:var(--green2)}
.ms.ms-c{background:#120e04;border-color:var(--gold)}
.ms-row{display:flex;justify-content:space-between;align-items:flex-start}
.ms-kg{font-size:20px;font-weight:700}
.ms-sub{font-size:10px;color:var(--muted);margin-top:2px}
.ms-prog{margin-top:10px}
.ms-plbl{display:flex;justify-content:space-between;margin-bottom:4px;font-size:11px}
.ms-pbar{height:8px;background:var(--b1);border-radius:4px;overflow:hidden}
.ms-pfill{height:100%;background:linear-gradient(90deg,var(--gold),var(--green));border-radius:4px;transition:width .6s}

/* ITI */
.iti-hero{background:linear-gradient(135deg,#1a0810,#120a0e);border:1px solid #6b2a3a;border-radius:var(--r);padding:20px;text-align:center;margin-bottom:14px}
.iti-opt{background:var(--p2);border:1px solid var(--b2);border-radius:var(--r2);padding:12px;margin-bottom:8px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:12px}
.iti-opt.sel{background:#1a120a;border-color:var(--gold)}
.iti-opt-ic{font-size:24px;flex-shrink:0}
.iti-opt-txt{flex:1}
.iti-opt-name{font-size:13px;font-weight:600}
.iti-opt-desc{font-size:11px;color:var(--muted);margin-top:2px}
.iti-opt-chk{font-size:18px;color:var(--gold)}

/* NOTIF */
.notif-bar{background:linear-gradient(135deg,#1a1a06,#12120a);border:1px solid var(--gold);border-radius:10px;padding:11px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;gap:10px}

/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--gold);color:#0a0a0f;padding:10px 22px;border-radius:20px;font-size:13px;font-weight:700;z-index:999;opacity:0;transition:all .35s;white-space:nowrap;pointer-events:none;font-family:var(--ff)}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* POPUP */
#pop{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;z-index:500;padding:20px}
#pop.on{display:flex}
.pop-box{background:linear-gradient(160deg,#1e1a06,#0f0d08);border:2px solid var(--gold);border-radius:var(--r3);padding:32px;text-align:center;max-width:320px;width:100%;animation:popIn .4s ease}
@keyframes popIn{from{transform:scale(.6) rotate(-3deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}

/* WEIGH BOX */
.wb{background:#140f04;border:1px solid var(--gold);border-radius:var(--r2);padding:12px;margin-bottom:10px}

/* PHASE BADGE */
.pbadge{display:inline-block;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0a0a0f;font-size:10px;font-weight:700;padding:3px 10px;border-radius:10px;margin-bottom:8px}
.lkbadge{display:inline-block;background:var(--b1);color:var(--muted);font-size:10px;font-weight:600;padding:3px 10px;border-radius:10px;margin-bottom:8px}

/* HOTEL BANNER */
.htl-bar{background:#120a04;border:1px solid var(--gold);border-radius:10px;padding:10px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}

/* DIVIDER */
.dvd{height:1px;background:var(--b1);margin:10px 0}

/* KCAL BAR */
.kb{height:10px;background:var(--b1);border-radius:5px;overflow:hidden;margin-top:6px}
.kf{height:100%;border-radius:5px;transition:width .4s}
.kf-ok{background:linear-gradient(90deg,var(--green),var(--gold))}
.kf-ov{background:var(--red)}

/* DROPDOWN */
.dd-wrap{position:relative;margin-bottom:8px}
.dd-menu{position:absolute;top:100%;left:0;right:0;background:var(--p2);border:1px solid var(--b2);border-radius:var(--r2);z-index:50;max-height:220px;overflow-y:auto;display:none;scrollbar-width:none}
.dd-menu.open{display:block}
.dd-item{padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--b1);transition:background .15s}
.dd-item:active{background:var(--b1)}
.dd-n{font-size:13px;color:var(--text)}
.dd-c{font-size:11px;color:var(--gold);margin-top:2px}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="hdr-row">
      <div>
        <div class="hdr-title">Divy's Journey</div>
        <div class="hdr-family">Iti · Chittu · and you</div>
      </div>
      <div>
        <div class="hdr-wt" id="h-wt">98 kg</div>
        <div class="hdr-goal">Goal: 75 kg</div>
      </div>
    </div>
    <div class="mode-row">
      <div class="mode-tog">
        <button id="mb-h" class="mhome" onclick="setMode('home')">🏠 Home</button>
        <button id="mb-t" onclick="setMode('hotel')">🏨 Hotel</button>
        <button id="mb-i" onclick="setMode('intl')">✈️ Intl</button>
      </div>
      <div class="hdr-date" id="h-date"></div>
    </div>
    <div class="prog-wrap">
      <div class="prog-row">
        <span>98 kg</span>
        <span class="prog-pct" id="h-pct">0%</span>
        <span>75 kg</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="h-pb" style="width:0%"></div></div>
    </div>
  </div>

  <div id="tabs">
    <button class="tb on" onclick="goTab('home')">🏠 Home</button>
    <button class="tb" onclick="goTab('cal')">📅 Calendar</button>
    <button class="tb" onclick="goTab('body')">📊 Body</button>
    <button class="tb" onclick="goTab('goals')">🎯 Goals</button>
    <button class="tb" onclick="goTab('rewards')">🎁 Rewards</button>
  </div>

  <div id="body"></div>
</div>

<!-- FLOATING CHAT BUTTON -->
<button id="chat-btn" onclick="toggleChat()" style="
  position:fixed;bottom:24px;right:20px;z-index:400;
  width:54px;height:54px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  border:none;cursor:pointer;
  box-shadow:0 4px 20px rgba(212,168,67,0.5);
  font-size:24px;display:flex;align-items:center;justify-content:center;
  transition:all .3s;font-family:var(--ff)
">✦</button>

<!-- CHAT PANEL -->
<div id="chat-panel" style="
  position:fixed;inset:0;z-index:450;
  background:rgba(0,0,0,.85);
  display:none;flex-direction:column;
  ">
  <div style="
    position:absolute;bottom:0;left:0;right:0;
    max-width:480px;margin:0 auto;
    background:linear-gradient(160deg,#1a1a0a,#0f0d08);
    border-top:1px solid var(--gold);border-radius:20px 20px 0 0;
    display:flex;flex-direction:column;
    height:82vh;
    ">
    <!-- Chat header -->
    <div style="padding:14px 16px 10px;border-bottom:1px solid var(--b1);display:flex;justify-content:space-between;align-items:center;flex-shrink:0">
      <div>
        <div style="font-family:var(--fs);font-size:18px;color:var(--gold)">✦ Divy's Companion</div>
        <div style="font-size:10px;color:var(--sub);margin-top:1px">Knows your chart · your meds · your journey</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <div id="chat-key-btn"></div>
        <button onclick="toggleChat()" style="background:var(--b1);border:none;color:var(--muted);border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;font-family:var(--ff)">✕</button>
      </div>
    </div>
    <!-- Messages -->
    <div id="chat-msgs" style="flex:1;overflow-y:auto;padding:14px;scrollbar-width:none;display:flex;flex-direction:column;gap:10px"></div>
    <!-- Input -->
    <div style="padding:12px;border-top:1px solid var(--b1);display:flex;gap:8px;flex-shrink:0;background:#0f0d08">
      <textarea id="chat-input" placeholder="Talk to me..." rows="2" style="
        flex:1;background:var(--p2);border:1px solid var(--b2);border-radius:10px;
        padding:10px 12px;color:var(--text);font-size:13px;font-family:var(--ff);
        resize:none;outline:none;line-height:1.5;
        -webkit-user-select:text;user-select:text
      " onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat();}"></textarea>
      <button onclick="sendChat()" id="chat-send" style="
        background:linear-gradient(135deg,var(--gold),var(--gold2));
        border:none;border-radius:10px;padding:0 16px;
        color:#0a0a0f;font-size:18px;cursor:pointer;flex-shrink:0
      ">↑</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<div id="pop">
  <div class="pop-box">
    <div style="font-size:60px;margin-bottom:12px">🏆</div>
    <div style="font-family:var(--fs);font-size:24px;color:var(--gold);margin-bottom:6px">MILESTONE!</div>
    <div style="font-size:30px;font-weight:700;color:var(--green);margin-bottom:10px" id="pop-kg"></div>
    <div style="font-size:13px;color:var(--sub);line-height:1.7;margin-bottom:20px">
      Divy — you did it.<br>Ask Iti to reveal your reward. 💝

// ── Cloud sync for Iti rewards ──
async function itiPush(){
  if(!ITI_SYNC_BIN||!ITI_SYNC_KEY) return;
  try{
    // Store only rewards and pw hash — never plain password
    const payload={rewards:ITI_D.rewards,pwHash:btoa(ITI_D.pw),msgs:ITI_MSGS,updated:new Date().toISOString()};
    await fetch('https://api.jsonbin.io/v3/b/'+ITI_SYNC_BIN,{
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':ITI_SYNC_KEY,'X-Bin-Private':'true'},
      body:JSON.stringify(payload)
    });
  }catch(e){console.log('Sync push failed',e);}
}

async function itiPull(){
  if(!ITI_SYNC_BIN||!ITI_SYNC_KEY) return false;
  try{
    const res=await fetch('https://api.jsonbin.io/v3/b/'+ITI_SYNC_BIN+'/latest',{
      headers:{'X-Master-Key':ITI_SYNC_KEY}
    });
    if(!res.ok) return false;
    const data=await res.json();
    const rec=data.record;
    if(rec&&rec.rewards){
      ITI_D.rewards=rec.rewards;
      if(rec.pwHash) ITI_D.pw=atob(rec.pwHash);
      if(rec.msgs) ITI_MSGS=rec.msgs;
      saveS('dv4-iti',ITI_D);
      saveS('dv4-iti-msgs',ITI_MSGS);
      return true;
    }
  }catch(e){console.log('Sync pull failed',e);}
  return false;
}

}

function loadS(k,def){
  try{
    const d=localStorage.getItem(k);
    if(!d) return def;
    const parsed=JSON.parse(d);
    // If default is array, return parsed array directly
    if(Array.isArray(def)) return Array.isArray(parsed)?parsed:def;
    // If default is object, merge
    return typeof parsed==='object'&&parsed!==null?{...def,...parsed}:def;
  }catch(e){return def;}
}
function saveS(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

function getTodayStr(){
  const d=new Date();
  // Use local date not UTC — toISOString() gives UTC which is wrong for IST (+5:30)
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

function checkDateRollover(){
  const newToday=getTodayStr();
  if(newToday===TODAY) return false;
  // Date has changed — reload all daily variables
  TODAY=newToday;
  FOOD_LOG=loadS('dv4-food-'+TODAY,[]);
  EX_LOG=loadS('dv4-ex-'+TODAY,{});
  WATER=loadS('dv4-water-'+TODAY,{ml:0});
  CHECKS=loadS('dv4-ch-'+TODAY,{});
  SUPPS=loadS('dv4-supps-'+TODAY,{});
  DAY_LOCK=loadS('dv4-lock',{lastDate:'',reason:''});
  // Reset cache
  _compCache={};_compCacheDate='';_ctxCache='';
  return true;
}

function askNotif(){
  if(!('Notification' in window)){flash('Notifications not supported');return;}
  Notification.requestPermission().then(p=>{
    S.notif=(p==='granted');saveMain();
    if(p==='granted'){schedNotifs();flash('Notifications enabled!');}
    else flash('Allow notifications in Chrome settings');
    renderTab(CUR);
  });
}
function schedNotifs(){
  if(!S.notif||Notification.permission!=='granted')return;
  const now=new Date();
  NOTIFS.forEach(n=>{
    const t=new Date();t.setHours(n.h,n.m,0,0);
    const ms=t-now;
    if(ms>0)setTimeout(()=>{
      try{new Notification(n.title,{body:n.body});}catch(e){}
    },ms);
  });
}

  const c=Math.round((SEL_FOOD.c||0)*ratio*10)/10;

  const name=document.getElementById('cf-name').value.trim();
  const kcalPer=parseInt(document.getElementById('cf-kcal').value)||0;
  const qty=parseFloat(document.getElementById('cf-qty').value)||0;
  const unit=document.getElementById('cf-unit')?document.getElementById('cf-unit').value:'g';
  const p=parseFloat(document.getElementById('cf-p')?document.getElementById('cf-p').value:0)||0;
  const c=parseFloat(document.getElementById('cf-c')?document.getElementById('cf-c').value:0)||0;

  const na=parseInt(document.getElementById('cf-na')?document.getElementById('cf-na').value:0)||0;
  if(!name||!kcalPer||!qty){flash('Name, kcal per 100g and quantity required');return;}
  const ratio=qty/100;

  // Save to personal library if new

  }

// CALENDAR
function rCal(){
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const d=new Date(CAL_MONTH.getFullYear(),CAL_MONTH.getMonth(),1);
  const firstDay=d.getDay();
  const daysInMonth=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
  const todayStr=getTodayStr();
  const startD=new Date(START_DATE);

  let grid='<div class="cal-grid">';
  ['S','M','T','W','T','F','S'].forEach(d=>grid+=`<div class="cal-day-hdr">${d}</div>`);
  for(let i=0;i<firstDay;i++)grid+=`<div class="cal-day empty"></div>`;

  for(let day=1;day<=daysInMonth;day++){
    const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const dt=new Date(ds);
    const isToday=ds===todayStr;
    const isStart=ds===START_DATE;
    const isPrep=ds>=PREP_START&&ds<START_DATE;
    const isPast=dt<new Date(todayStr)&&!isToday;
    const isFuture=dt>new Date(todayStr);
    const calEntry=S.calData[ds];

    let cls='cal-day';
    const comp=getDayCompletion(ds);
    const tripDay=getTripForDate(ds);
    if(isToday&&isPrep)cls+=' today';
    else if(isToday)cls+=' today';
    else if(isStart)cls+=' start';
    else if(isPrep&&comp.pass)cls+=' prep-done';
    else if(isPrep)cls+=' prep';
    else if(comp.pass&&isPast)cls+=' done';
    else if(isPast&&dt>=startD&&ds>=START_DATE)cls+=' skipped';
    else if(isFuture)cls+=' future';
    else cls+=' future';

    const dot=S.weights[ds]?'<div class="cal-dot"></div>':'';
    const prepDot=isPrep?'<div style="position:absolute;top:2px;right:3px;width:4px;height:4px;border-radius:50%;background:#60b0e0;opacity:0.7"></div>':'';
    const travelDot=tripDay?`<div style="position:absolute;top:2px;left:3px;width:4px;height:4px;border-radius:50%;background:${tripDay.type==='international'?'var(--blue)':'var(--orange)'};opacity:0.8"></div>`:'';
    const clickable=true;
    grid+=`<div class="${cls}" style="position:relative;cursor:pointer" onclick="CAL_VIEW_DATE='${ds}';CAL_DAY_TAB='schedule';renderTab('cal')">${day}${dot}${prepDot}${travelDot}</div>`;
  }
  grid+='</div>';

  const prev=new Date(CAL_MONTH);prev.setMonth(prev.getMonth()-1);
  const next=new Date(CAL_MONTH);next.setMonth(next.getMonth()+1);

  return `
    <div class="c">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <button class="btn btn-dim btn-sm" onclick="CAL_MONTH=new Date(${prev.getFullYear()},${prev.getMonth()},1);renderTab('cal')">←</button>
        <div style="font-size:15px;font-weight:700;color:var(--gold)">${months[d.getMonth()]} ${d.getFullYear()}</div>
        <button class="btn btn-dim btn-sm" onclick="CAL_MONTH=new Date(${next.getFullYear()},${next.getMonth()},1);renderTab('cal')">→</button>
      </div>
      ${grid}
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px">
        ${[
          ['done','var(--green2)','var(--green)','Done'],
          ['today','var(--gold)','#0a0a0f','Today'],
          ['skipped','#3a1a1a','var(--red)','Missed'],
          ['start','var(--b1)','var(--gold)','Mar 28 Start'],
          ['prep','#0a1a2a','#60b0e0','Prep (23–27)'],
          ['prep-done','#0a2a1a','#50a070','Prep Done'],
        ].map(([,bg,col,lbl])=>`
          <div style="display:flex;align-items:center;gap:5px">
            <div style="width:12px;height:12px;border-radius:3px;background:${bg};border:1px solid ${col}"></div>
            <span style="font-size:10px;color:var(--muted)">${lbl}</span>
          </div>`).join('')}
        <div style="display:flex;align-items:center;gap:5px">
          <div style="width:8px;height:8px;border-radius:50%;background:var(--gold)"></div>
          <span style="font-size:10px;color:var(--muted)">Weight logged</span>
        </div>
      </div>
    </div>

    <div class="c">
      <div class="ctitle">Journey Stats</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        ${[
          ['Day',daysSinceStart()+' of journey'],
          ['Start','March 28, 2026'],
          ['Cycles',S.totalCycles+' completed'],
          ['Lost',Math.max(0,SW-S.wt).toFixed(1)+' kg so far'],
        ].map(([l,v])=>`<div style="background:var(--p2);border-radius:8px;padding:10px">
          <div style="font-size:10px;color:var(--muted)">${l}</div>
          <div style="font-size:14px;font-weight:700;color:var(--gold);margin-top:2px">${v}</div>
        </div>`).join('')}

    <div class="c">

          </div>`;

        return `<div style="font-size:11px;color:var(--sub);margin-bottom:10px">

        </div>${projections}

}

function rBody(){
  const ms=BODY_LOG.measurements;
  const latest=ms[0]||null;
  const prev=ms[1]||null;

  function chg(key,unit){
    if(!latest||!prev||!latest[key]||!prev[key])return '';
    const d=(latest[key]-prev[key]).toFixed(1);
    const t=MEAS_TARGETS[key];
    const good=t?( t.better==='down'?d<0 : t.better==='up'?d>0 : Math.abs(d)<1 ):d<0;
    return '<span style="color:'+(good?'var(--green)':'var(--red)')+';font-size:10px;margin-left:5px">'+(d>0?'+':'')+d+unit+'</span>';
  }

  const bmi=latest&&latest.bmi?latest.bmi:null;
  const bmiCol=bmi?bmi>30?'var(--red)':bmi>25?'var(--orange)':'var(--green)':'var(--muted)';
  const bmiLbl=bmi?bmi>35?'Obese III':bmi>30?'Obese II':bmi>27?'Obese I':bmi>25?'Overweight':bmi>18.5?'Healthy':'Underweight':'';

  // Build measurement bar charts
  function measBar(key){
    const t=MEAS_TARGETS[key];
    const val=latest&&latest[key]?latest[key]:t.current;
    const prev_val=prev&&prev[key]?prev[key]:null;
    const pct=Math.min(100,Math.max(0,Math.round(((t.max-val)/(t.max-t.target))*100)));
    const onTarget=t.better==='down'?val<=t.target:t.better==='up'?val>=t.target:Math.abs(val-t.target)<=2;
    const barCol=onTarget?'var(--green)':t.better==='down'&&val>t.target*1.15?'var(--red)':t.color;
    const diff=prev_val?parseFloat((val-prev_val).toFixed(1)):null;
    const diffGood=diff!==null?(t.better==='down'?diff<0:t.better==='up'?diff>0:Math.abs(diff)<1):null;
    return `
      <div style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">

function saveJournalEntry(){
  const text=document.getElementById('j-entry').value.trim();

  const weekKey=getWeekKey();
  JOURNAL.entries[weekKey]={text,date:TODAY,saved:new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})};
  saveJournal();flash('Saved ✓');renderTab('journal');
}

function getWeekKey(){
  const d=new Date(TODAY);
  const day=d.getDay();
  const diff=d.getDate()-day+(day===0?-6:1);
  const mon=new Date(d.setDate(diff));
  return mon.toISOString().split('T')[0];
}

function getWeekLabel(key){
  const d=new Date(key);
  const end=new Date(key);end.setDate(end.getDate()+6);
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${d.getDate()} ${months[d.getMonth()]} – ${end.getDate()} ${months[end.getMonth()]}`;
}

function isWednesday(){return new Date().getDay()===3;}

function rJournal(){
  const weekKey=getWeekKey();

// ═══════════ DAY LOCK ═══════════
function checkDayLock(){
  const yesterday=new Date(TODAY);
  yesterday.setDate(yesterday.getDate()-1);
  const yd=yesterday.toISOString().split('T')[0];
  if(yd<START_DATE&&yd<PREP_START) return false; // before journey
  if(DAY_LOCK.lastDate===TODAY) return false; // already handled today
  const ydChecks=loadS('dv4-ch-'+yd,{});
  const ydSched=PREP_DAYS[yd]?PREP_DAYS[yd].movement:SCH_HOME;
  const done=Object.values(ydChecks).filter(Boolean).length;
  const total=ydSched.length;
  if(done>=Math.floor(total*0.8)) return false; // 80% = pass
  return yd; // return yesterday date if lock needed
}

function resolvelock(reason){
  const lockDate=checkDayLock();
  if(!lockDate){flash('All good!');return;}
  const grace=['travel','health','work'];
  if(grace.includes(reason)){
    S.calData[lockDate]='grace-'+reason;
    DAY_LOCK={lastDate:TODAY,reason};
    saveS('dv4-lock',DAY_LOCK);
    flash('Grace noted. Streak protected.');
  } else {
    // forfeit — push current cycle reward to next
    S.streak=Math.max(0,S.streak-1);
    S.calData[lockDate]='skipped';
    DAY_LOCK={lastDate:TODAY,reason:'forfeit'};
    saveS('dv4-lock',DAY_LOCK);
    flash('Honest. One reward deferred. Streak resets.');
  }
  saveMain();
  document.getElementById('lock-modal').style.display='none';
  renderTab('home');
}

function saveVitals(){saveS('dv4-vitals',VITALS);}
function logVitals(){
  const sleep=document.getElementById('v-sleep').value;
  const wake=document.getElementById('v-wake').value;
  const energy=document.getElementById('v-energy').value;
  if(!energy){flash('Tap an energy level');return;}
  VITALS[TODAY]={sleep,wake,energy:parseInt(energy),date:TODAY};
  saveVitals();

  // Auto-check tasks based on logged times
  const isPrep=TODAY>=PREP_START&&TODAY<START_DATE;
  const sch=isPrep&&PREP_DAYS[TODAY]?PREP_DAYS[TODAY].movement:SCH_HOME;

  if(wake){
    const [wh,wm]=wake.split(':').map(Number);
    const wakeMinutes=wh*60+wm;
    // Auto-check 5 AM rise if woke by 5:30 AM
    if(wakeMinutes<=330){
      sch.forEach((item,i)=>{
        if(item.t==='5:00 AM') CHECKS['d'+i]=true;
      });
    }
  }
  if(sleep){
    const [sh,sm]=sleep.split(':').map(Number);
    const sleepMin=sh*60+sm;
    // Auto-check 9:30 PM sleep if slept by 10:00 PM (or before midnight)
    const sleepOk=sleepMin>=0&&sleepMin<=120||sleepMin>=1290; // before midnight or after 9:30pm
    if(sleepOk){
      sch.forEach((item,i)=>{
        if(item.t==='9:30 PM'||item.t==='9:30 PM') CHECKS['d'+i]=true;
      });
    }
  }
  saveCh();
  flash('Morning check-in saved ✓');
  renderTab(CUR);
}

// ═══════════ CALENDAR DAY VIEW ═══════════
function getDayCompletion(dateStr){
  // Reset cache daily
  if(_compCacheDate!==TODAY){_compCache={};_compCacheDate=TODAY;}
  // Only cache dates older than 7 days — recent dates change within the session
  const sevenDaysAgo=new Date(TODAY);sevenDaysAgo.setDate(sevenDaysAgo.getDate()-7);
  const isOld=dateStr<sevenDaysAgo.toISOString().split('T')[0];
  if(isOld&&_compCache[dateStr]) return _compCache[dateStr];
  const isToday=dateStr===TODAY;
  const dayChecks=isToday?CHECKS:loadS('dv4-ch-'+dateStr,{});
  const isPrep=dateStr>=PREP_START&&dateStr<START_DATE;
  const prepDay=isPrep?PREP_DAYS[dateStr]:null;
  const trip=getTripForDate(dateStr);
  let effectiveMode=S.mode;
  if(trip) effectiveMode=trip.type==='international'?'intl':trip.type==='domestic'?'hotel':'home';

  // Schedule items
  const sch=prepDay?prepDay.movement:effectiveMode==='hotel'?SCH_HOTEL:effectiveMode==='intl'?SCH_INTL:SCH_HOME;
  const schDone=Object.entries(dayChecks).filter(([k,v])=>k.startsWith('d')&&v).length;
  const schTotal=sch.length;

  // Medications (6)
  const medKeys=['m1','m2','m3','m4','m5','m6'];
  const medDone=medKeys.filter(k=>dayChecks[k]).length;
  const medTotal=6;

  // Supplements (6) — only count for today from live SUPPS
  const suppKeys=['ubq','fish','vitd','fiber','trunativ','mag'];
  const daySuppsData=isToday?SUPPS:loadS('dv4-supps-'+dateStr,{});
  const suppDone=suppKeys.filter(k=>daySuppsData[k]).length;
  const suppTotal=6;

  // Calories — within 1300-1500 = pass
  const dayFood=isToday?FOOD_LOG:loadS('dv4-food-'+dateStr,[]);
  const kcal=dayFood.reduce((s,f)=>s+(f.kcal||0),0);
  const calPass=kcal>=1200&&kcal<=1700?1:0;
  const calTotal=1;

  // Water — >= 2500ml minimum threshold
  const dayWater=isToday?WATER.ml:(loadS('dv4-water-'+dateStr,{ml:0}).ml||0);
  const waterPass=dayWater>=2500?1:0;
  const waterTotal=1;

  const done=schDone+medDone+suppDone+calPass+waterPass;
  const total=schTotal+medTotal+suppTotal+calTotal+waterTotal;
  const pct=total>0?Math.round((done/total)*100):0;

  const result={
    done,total,pct,pass:pct>=80,
    breakdown:{
      sch:{done:schDone,total:schTotal},
      med:{done:medDone,total:medTotal},
      supp:{done:suppDone,total:suppTotal},
      cal:{done:calPass,total:calTotal,kcal},
      water:{done:waterPass,total:waterTotal,ml:dayWater}
    }
  };
  if(isOld) _compCache[dateStr]=result;
  return result;
}

      logged+=`<div style="margin-bottom:10px"><div style="font-size:11px;font-weight:700;color:var(--gold);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">${mealNames[key]} · ${mKcal} kcal</div>

          </div>
        </div>`).join('')}
      </div>`;
    });
    // Show supplement nutrition if any
    if(suppNutrition.length>0){
      logged+=`<div style="margin-bottom:10px">
        <div style="font-size:11px;font-weight:700;color:var(--teal);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">💊 Supplements (auto)</div>

      </div>`;
    }
    if(logged) html+=`<div class="c"><div class="ctitle">Food Log</div>${logged}</div>`;
    // My Foods library
    if(USER_FOODS.length>0){
      html+=`<div class="c" style="border-color:var(--b2)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">

          <div style="display:flex;gap:8px;align-items:center">
            <span style="color:var(--muted)">${f.cal}kcal</span>
            <span onclick="USER_FOODS.splice(${i},1);saveS('dv4-user-foods',USER_FOODS);renderTab('cal')" style="color:var(--red);cursor:pointer">✕</span>
          </div>
        </div>`).join('')}
        ${USER_FOODS.length>5?`<div style="font-size:10px;color:var(--muted);margin-top:4px">+${USER_FOODS.length-5} more</div>`:''}
      </div>`;
    }

  // ── NOTES TAB ──
  else if(CAL_DAY_TAB==='notes'){
    const weekKey=getWeekKey();
    const existing=JOURNAL.entries[weekKey];
    const isWed=new Date(dateStr).getDay()===3;
    html+=`<div class="c ${isWed?'c-gold':''}">
      <div class="ctitle">Weekly Journal</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:8px">
        ${isWed?'✦ Wednesday — Mercury day. Write one honest sentence.':'Week of '+getWeekLabel(weekKey)}
      </div>
      <textarea id="j-entry" class="inp" rows="5" placeholder="One honest sentence about this week. No sugarcoating." style="resize:none;line-height:1.6">${existing?existing.text:''}</textarea>

    </div>
    ${Object.entries(JOURNAL.entries).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,5).map(([key,entry])=>`
      <div style="padding:10px 0;border-bottom:1px solid #1a1610">
        <div style="font-size:11px;font-weight:700;color:var(--gold)">${getWeekLabel(key)}</div>
        <div style="font-size:12px;color:var(--text);font-style:italic;margin-top:4px">"${esc(entry.text)}"</div>
      </div>`).join('')}`;
  }

  return html;
}

  return rIti();

let GROQ_KEY=localStorage.getItem('dv4-groq-key')||'';

function saveApiKey(){
  const k=document.getElementById('apikey-inp').value.trim();
  if(!k.startsWith('gsk_')){flash('Invalid key — must start with gsk_');return;}
  GROQ_KEY=k;
  localStorage.setItem('dv4-groq-key',k);
  flash('Groq key saved ✓');
  renderChatContent();
}

function clearApiKey(){
  GROQ_KEY='';
  localStorage.removeItem('dv4-groq-key');
  CHAT_HISTORY=[];
  renderChatContent();
}

      :`<button onclick="document.getElementById('chat-msgs').scrollTop=0" style="background:#2a1006;border:1px solid var(--gold);color:var(--gold);border-radius:6px;padding:4px 10px;font-size:10px;cursor:pointer;font-family:var(--ff)">Setup</button>`;
  }

  if(!GROQ_KEY){
    msgs.innerHTML=`
      <div style="padding:4px">
        <div style="background:linear-gradient(135deg,#1a1206,#12100a);border:1px solid var(--gold);border-radius:14px;padding:20px;text-align:center;margin-bottom:16px">
          <div style="font-size:32px;margin-bottom:8px">🔑</div>
          <div style="font-size:15px;font-weight:700;color:var(--gold);margin-bottom:6px">One-time setup</div>
          <div style="font-size:12px;color:var(--sub);line-height:1.7">Uses Groq AI — completely free, no billing needed. Get your key from console.groq.com in 1 minute.</div>
        </div>

        <div style="background:var(--p2);border-radius:12px;padding:14px;margin-bottom:12px">
          <div style="font-size:11px;font-weight:700;color:var(--gold);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px">3 steps</div>
          ${[
            ['1','Go to','console.groq.com'],
            ['2','Sign up free with Google → API Keys → Create API key',''],
            ['3','Paste it below',''],
          ].map(([n,t,sub])=>`<div style="display:flex;gap:10px;margin-bottom:8px;align-items:flex-start">
            <div style="width:22px;height:22px;border-radius:50%;background:var(--gold);color:#0a0a0f;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">${n}</div>
            <div style="font-size:12px;color:var(--text)">${t}${sub?`<br><span style="color:var(--gold);font-weight:700">${sub}</span>`:''}</div>
          </div>`).join('')}
        </div>

        <div style="margin-bottom:10px">
          <input id="apikey-inp" class="inp" type="text" placeholder="gsk_..." style="font-size:13px;letter-spacing:1px"/>
          <div style="font-size:10px;color:var(--muted);margin-top:5px;text-align:center">Stored locally · Never shared · Delete anytime</div>
        </div>
        <button class="btn btn-g" onclick="saveApiKey()" style="font-size:14px;padding:13px">Save Key & Start Chat →</button>
      </div>`;
  } else {
    msgs.innerHTML='';
    if(CHAT_HISTORY.length===0){
      const hour=new Date().getHours();
      const greeting=hour<7?'Still early, Divy.':hour<12?'Good morning, Divy.':hour<17?'Afternoon, Divy.':'Evening, Divy.';
      addMsg('assistant',greeting+' I know where you are today. What is on your mind?');
    } else {
      CHAT_HISTORY.forEach(m=>addMsg(m.role,m.content,true));
    }

function buildContext(){
  // Cache for 60 seconds to avoid rebuilding on every message
  const now=Date.now();
  if(_ctxCache&&(now-_ctxTime)<60000) return _ctxCache;
  _ctxTime=now;
  // Build fresh
  const comp=getDayCompletion(TODAY);
  const vitals=VITALS[TODAY]||null;
  const trip=getTripForDate(TODAY);
  const isPrep=TODAY>=PREP_START&&TODAY<START_DATE;
  const prepDay=isPrep?PREP_DAYS[TODAY]:null;
  const daysToStart=Math.ceil((new Date(START_DATE)-new Date(TODAY))/(1000*60*60*24));
  const dayNum=daysSinceStart();
  const suppsDone=Object.entries(SUPPS).filter(([,v])=>v).map(([k])=>k);
  const medsDone=Object.entries(CHECKS).filter(([k,v])=>k.startsWith('m')&&v).length;
  const water=WATER.ml;
  const kcal=totalKcal();
  const ep=exPts();

  _ctxCache=`You are Divy's personal health and life companion — built into his daily app. You know everything about him. Respond like a wise, warm, direct friend — not a coach, not a doctor. Never preachy. Never generic. Always specific to Divy.

ABOUT DIVY:
- Full name: Divyanshu Shrivastava. Called Divy. Age 37. 184cm. Current weight ${S.wt}kg. Goal 75kg.
- Post kidney transplant June 27, 2023. Kidney functioning well — creatinine stable at 1.7.
- Works in Global Product Management at Armstrong Fluid Technology, Bengaluru. Travels frequently.
- Family: Wife Iti, daughter Chittu. Based in Bengaluru near Jakkur Lake (700m from home).
- Vegetarian + eggs + chicken (Sat/Sun only) + occasional goat mutton. No fish/seafood preference. No beef, pork, lamb. No milk, no Torai, Tinda, Gilki. No grapefruit, pomelo ever.

MEDICATIONS (never adjust, just acknowledge timing):
- 7:15 AM: Omnacortil 5mg + MetXL 50mg (after breakfast)
- 8:00 AM: Mycofit 360mg
- 9:00 AM: Takfa 4mg (Tacrolimus — immunosuppressant, critical)
- 6:30 PM: MetXL 25mg
- 8:00 PM: Mycofit 360mg + Atorva 10mg + Telma 40mg
- 9:00 PM: Takfa 4mg
- Supplements at lunch (1–1:30 PM): Ubiquinol 100mg + Omega-3 + D3 alt days + Magnesium

ASTROLOGICAL PROFILE:
- DOB: 19 September 1987, 12:45 AM, Tundla UP
- Gemini Ascendant. Lagna lord Mercury in Virgo (own sign, very strong) — wearing Panna emerald in gold.
- Cancer Moon, 2nd house, Pushya Nakshatra — emotional, water-loving, family-centred.
- Venus DEBILITATED in Virgo 4th house — governs kidneys, comfort-seeking tendency. Neecha Bhanga applies (Mercury cancels debilitation).

- 8-day cycles, Wednesday Mercury reviews, March 28 start date.

PALMISTRY:
- Head line curves toward Luna — internalises stress physically. Breathwork is non-negotiable.
- Heart line to Jupiter — absorbs others' stress. Family warmth is medicine.
- Short Mercury finger — tendency to understate symptoms to doctors.
- Hypermobile thumb — generous, over-commits, health-sensitive.

CURRENT STATUS TODAY (${TODAY}):
- ${isPrep?prepDay.label+' — '+prepDay.theme:'Day '+dayNum+' of journey'}
- ${trip?'Travel day: '+trip.type:'Home day in Bengaluru'}
- Day completion: ${comp.done}/${comp.total} items (${comp.pct}%) — ${comp.pass?'✅ Green day':'needs '+Math.max(0,Math.ceil(comp.total*0.8)-comp.done)+' more for 80%'}
- Meds checked: ${medsDone}/6

TONE RULES:

function toggleChat(){
  CHAT_OPEN=!CHAT_OPEN;
  const panel=document.getElementById('chat-panel');
  const btn=document.getElementById('chat-btn');
  panel.style.display=CHAT_OPEN?'flex':'none';
  btn.style.transform=CHAT_OPEN?'scale(0.9)':'scale(1)';
  if(CHAT_OPEN) renderChatContent();
  if(CHAT_OPEN&&GROQ_KEY) setTimeout(()=>document.getElementById('chat-input').focus(),300);
}

function addMsg(role,text,replay){
  const msgs=document.getElementById('chat-msgs');
  if(!msgs) return;
  const isUser=role==='user';
  const div=document.createElement('div');
  div.style.cssText=`display:flex;justify-content:${isUser?'flex-end':'flex-start'}`;
  div.innerHTML=`<div style="
    max-width:82%;padding:10px 13px;border-radius:${isUser?'14px 14px 4px 14px':'14px 14px 14px 4px'};
    background:${isUser?'linear-gradient(135deg,var(--gold),var(--gold2))':'var(--p2)'};
    color:${isUser?'#0a0a0f':'var(--text)'};
    font-size:13px;line-height:1.6;font-family:var(--ff);
    border:${isUser?'none':'1px solid var(--b2)'};
  ">${text.replace(/\n/g,'<br>')}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
  if(!replay) CHAT_HISTORY.push({role,content:text});
}

function addTyping(){
  const msgs=document.getElementById('chat-msgs');
  const div=document.createElement('div');
  div.id='chat-typing';
  div.style.cssText='display:flex;justify-content:flex-start';
  div.innerHTML=`<div style="padding:10px 14px;border-radius:14px 14px 14px 4px;background:var(--p2);border:1px solid var(--b2)">
    <div style="display:flex;gap:4px;align-items:center">
      ${[0,150,300].map(d=>`<div style="width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulse 1s ${d}ms infinite"></div>`).join('')}
    </div>
  </div>`;
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
}

function removeTyping(){
  const t=document.getElementById('chat-typing');
  if(t) t.remove();
}

// Add pulse animation to style
const chatStyle=document.createElement('style');
chatStyle.textContent='@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}';
document.head.appendChild(chatStyle);

async function sendChat(){
  if(!GROQ_KEY){renderChatContent();return;}
  const inp=document.getElementById('chat-input');
  const text=inp.value.trim();
  if(!text) return;
  inp.value='';
  addMsg('user',text);
  addTyping();
  document.getElementById('chat-send').disabled=true;

  try{
    const systemPrompt=buildContext();
    const history=CHAT_HISTORY.slice(-12);
    const apiMessages=[];
    for(let i=0;i<history.length-1;i++) apiMessages.push({role:history[i].role,content:history[i].content});
    apiMessages.push({role:'user',content:text});

    // Groq API call
    const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer '+GROQ_KEY
      },
      body:JSON.stringify({
        model:'llama-3.3-70b-versatile',
        max_tokens:800,
        temperature:0.8,
        messages:[
          {role:'system',content:systemPrompt},
          ...apiMessages
        ]
      })
    });

    if(!res.ok){
      const err=await res.json().catch(()=>({}));
      throw new Error(err.error?.message||'API error '+res.status);
    }

    const data=await res.json();
    removeTyping();
    const reply=data.choices&&data.choices[0]?.message?.content||'I am here, Divy. Try again.';
    addMsg('assistant',reply);
  }catch(e){
    removeTyping();
    const msg=e.message||'';
    if(msg.includes('401')||msg.includes('auth')||msg.includes('API key')){
      addMsg('assistant','Key looks wrong. Go to console.groq.com, sign up free, create an API key starting with gsk_ and paste it here.');
    } else if(msg.includes('Failed to fetch')||msg.includes('NetworkError')||msg.includes('CORS')){
      addMsg('assistant','The chat is blocked when opening from local storage. Open this file via Google Drive → three dots → Open with Chrome, or any https:// URL. Everything else in the app works fine offline.');
    } else {
      addMsg('assistant','Something went wrong: '+msg+'. Check your connection and try again.');
    }
  }
  document.getElementById('chat-send').disabled=false;
}

// ═══════════ PHOTOS ═══════════
function savePhoto(slot,input){
  const file=input.files[0];
  if(!file) return;
  // Compress to max 400px wide before storing
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      const max=400;
      const scale=Math.min(1,max/Math.max(img.width,img.height));
      canvas.width=Math.round(img.width*scale);
      canvas.height=Math.round(img.height*scale);
      canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
      PHOTOS[slot]=canvas.toDataURL('image/jpeg',0.75);
      saveS('dv4-photos',PHOTOS);
      flash('Photo saved 📸');
      renderTab('body');
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

// ═══════════ DATA EXPORT ═══════════
function exportData(){
  const data={
    exported:new Date().toISOString(),
    version:'divy-pwa-v4',
    main:loadS('dv4-main',{}),
    body:loadS('dv4-body',{}),
    journal:loadS('dv4-journal',{}),
    vitals:loadS('dv4-vitals',{}),
    travel:loadS('dv4-travel',{}),
    weights:{},
    food:{},
    water:{},
    checks:{},
    supps:{},
  };
  // Collect dated data from last 180 days
  const start=new Date(START_DATE);
  const prep=new Date(PREP_START);
  for(let d=new Date(prep);d<=new Date();d.setDate(d.getDate()+1)){
    const ds=d.toISOString().split('T')[0];
    const ch=loadS('dv4-ch-'+ds,null);if(ch) data.checks[ds]=ch;
    const f=loadS('dv4-food-'+ds,null);if(f) data.food[ds]=f;
    const w=loadS('dv4-water-'+ds,null);if(w) data.water[ds]=w;
    const s=loadS('dv4-supps-'+ds,null);if(s) data.supps[ds]=s;
  }
  const json=JSON.stringify(data,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='divy-journey-backup-'+TODAY+'.json';
  a.click();URL.revokeObjectURL(url);
  flash('Data exported ✓');
}

function importData(){
  const input=document.createElement('input');
  input.type='file';input.accept='.json';
  input.onchange=e=>{
    const file=e.target.files[0];
    if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(data.version!=='divy-pwa-v4'){flash('Wrong file format');return;}
        if(data.main) saveS('dv4-main',data.main);
        if(data.body) saveS('dv4-body',data.body);
        if(data.journal) saveS('dv4-journal',data.journal);
        if(data.vitals) saveS('dv4-vitals',data.vitals);
        if(data.travel) saveS('dv4-travel',data.travel);
        Object.entries(data.checks||{}).forEach(([k,v])=>saveS('dv4-ch-'+k,v));
        Object.entries(data.food||{}).forEach(([k,v])=>saveS('dv4-food-'+k,v));
        Object.entries(data.water||{}).forEach(([k,v])=>saveS('dv4-water-'+k,v));
        Object.entries(data.supps||{}).forEach(([k,v])=>saveS('dv4-supps-'+k,v));
        flash('Data restored ✓ — reload the app');
        setTimeout(()=>location.reload(),1500);
      }catch(e){flash('Could not read file');}
    };
    reader.readAsText(file);
  };
  input.click();
}
